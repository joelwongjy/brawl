<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Challenger's Special Night - Character Select</title>
<link href="https://fonts.googleapis.com/css2?family=Bowlby+One&family=Russo+One&family=Bangers&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    width: 100vw; height: 100vh;
    overflow: hidden;
    background: #000;
    font-family: 'Russo One', 'Impact', sans-serif;
    user-select: none;
    color: #fff;
  }

  /* ============================================================ */
  /*  STARFIELD BACKGROUND                                        */
  /* ============================================================ */
  .stage {
    position: relative;
    width: 100%; height: 100%;
    background: #000209;
    overflow: hidden;
  }

  /* Layered starfield (many small stars at different scales) */
  .starfield {
    position: absolute;
    inset: 0;
    background-color: #000209;
    background-image:
      radial-gradient(ellipse at 50% 50%, rgba(20, 50, 110, 0.55) 0%, transparent 55%),
      /* big stars */
      radial-gradient(1.6px 1.6px at 12% 18%, #ffffff 50%, transparent 60%),
      radial-gradient(1.4px 1.4px at 78% 64%, #cfe6ff 50%, transparent 60%),
      radial-gradient(1.8px 1.8px at 28% 82%, #ffffff 50%, transparent 60%),
      radial-gradient(1.4px 1.4px at 62% 14%, #cfe6ff 50%, transparent 60%),
      radial-gradient(1.6px 1.6px at 92% 32%, #ffffff 50%, transparent 60%),
      radial-gradient(1.4px 1.4px at  6% 54%, #cfe6ff 50%, transparent 60%),
      /* medium stars */
      radial-gradient(1px 1px at 22% 32%, rgba(255,255,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 48% 22%, rgba(200,220,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 72% 48%, rgba(255,255,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 36% 68%, rgba(200,220,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 88% 78%, rgba(255,255,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 16% 88%, rgba(200,220,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 56% 88%, rgba(255,255,255,0.85) 50%, transparent 60%),
      radial-gradient(1px 1px at 96% 12%, rgba(200,220,255,0.85) 50%, transparent 60%),
      /* tiny stars (denser) */
      radial-gradient(0.6px 0.6px at 5% 10%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 15% 60%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 25% 35%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 33% 15%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 42% 78%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 51% 44%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 60% 28%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 70% 72%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 80% 18%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 86% 56%, rgba(255,255,255,0.55) 50%, transparent 60%),
      radial-gradient(0.6px 0.6px at 94% 92%, rgba(255,255,255,0.55) 50%, transparent 60%);
    background-repeat: no-repeat;
    animation: twinkle 4s ease-in-out infinite alternate;
  }
  @keyframes twinkle {
    from { opacity: 0.85; }
    to   { opacity: 1; }
  }

  /* Sphere meridians (warped grid lines) */
  .sphere-grid {
    position: absolute;
    width: 150vmin; height: 115vmin;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    pointer-events: none;
    opacity: 1;
    filter: drop-shadow(0 0 6px rgba(120, 210, 255, 0.55))
            drop-shadow(0 0 14px rgba(80, 180, 255, 0.35));
  }

  /* Top + bottom globe arcs - bright cyan curved rim of the sphere */
  .arc {
    position: absolute;
    left: 50%;
    transform: translateX(-50%);
    width: 220vw;
    height: 60vh;
    pointer-events: none;
    z-index: 2;
    border-radius: 50%;
    background: transparent;
  }
  .arc.top {
    top: -52vh;
    border-bottom: 2px solid rgba(170, 230, 255, 0.95);
    box-shadow:
      0 4px 24px rgba(140, 220, 255, 0.7),
      0 18px 70px rgba(60, 160, 240, 0.35);
  }
  .arc.bottom {
    bottom: -52vh;
    border-top: 2px solid rgba(170, 230, 255, 0.95);
    box-shadow:
      0 -4px 24px rgba(140, 220, 255, 0.7),
      0 -18px 70px rgba(60, 160, 240, 0.35);
  }
  /* secondary inner arc to suggest a band */
  .arc::after {
    content: '';
    position: absolute;
    inset: 10px;
    border-radius: 50%;
    border: 1px solid rgba(120, 200, 255, 0.22);
  }

  /* ============================================================ */
  /*  TIME COUNTER (top center) - sits inside top arc band         */
  /* ============================================================ */
  .time-counter {
    position: absolute;
    top: 1.5vh;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 5;
  }
  .time-label {
    font-family: 'Bowlby One', 'Impact', sans-serif;
    font-size: clamp(20px, 2.4vw, 36px);
    letter-spacing: 0.42em;
    color: #e7f4ff;
    text-shadow: 0 0 14px rgba(120,210,255,0.95), 0 0 30px rgba(60,160,240,0.6);
    margin-right: -0.42em;
  }
  .time-infinity {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(46px, 7.5vw, 100px);
    color: #f6d758;
    line-height: 0.8;
    text-shadow:
      0 0 16px rgba(255, 220, 80, 0.95),
      0 0 36px rgba(255, 180, 0, 0.7);
  }

  /* ============================================================ */
  /*  HERO SELECT (bottom center)                                  */
  /* ============================================================ */
  .hero-select {
    position: absolute;
    bottom: 3.5vh;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'Bowlby One', 'Impact', sans-serif;
    font-size: clamp(40px, 5.5vw, 80px);
    letter-spacing: 0.18em;
    color: #ffffff;
    text-shadow:
      0 0 6px rgba(255,255,255,0.95),
      0 0 22px rgba(120,210,255,0.95),
      0 0 48px rgba(60,140,220,0.9),
      0 4px 0 #0a2150;
    z-index: 5;
    white-space: nowrap;
  }
  .hero-select::after {
    content: '';
    display: block;
    margin: 6px auto 0;
    width: 60%;
    height: 4px;
    background: linear-gradient(90deg, transparent, #f6d758 40%, #ffea88 50%, #f6d758 60%, transparent);
    box-shadow: 0 0 14px rgba(246, 215, 88, 0.9);
  }

  /* ============================================================ */
  /*  CHARACTER GRID  (3x3 = 9 portraits) - sits on curved surface */
  /* ============================================================ */
  .grid-wrapper {
    position: absolute;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%);
    z-index: 10;
  }
  .grid {
    --slot: clamp(100px, 11vw, 160px);
    display: grid;
    grid-template-columns: repeat(3, var(--slot));
    grid-template-rows: repeat(3, var(--slot));
    gap: 4px;
    padding: 4px;
  }
  .slot {
    position: relative;
    width: var(--slot); height: var(--slot);
    background: rgba(8, 18, 42, 0.55);
    border: 1px solid rgba(150, 215, 255, 0.28);
    overflow: hidden;
    box-shadow:
      inset 0 0 18px rgba(20, 50, 100, 0.35),
      0 0 0 1px rgba(0, 20, 60, 0.4);
  }
  .slot img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    transform: translateY(-12%) scale(1.35);
    transform-origin: center top;
  }
  /* Columns 2 & 3 portraits sit 20% higher than column 1 */
  .grid .slot:nth-child(3n+2) img,
  .grid .slot:nth-child(3n) img {
    transform: translateY(-32%) scale(1.35);
  }
  .slot-name {
    position: absolute;
    left: 0; right: 0; bottom: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.78) 30%, rgba(0,0,0,0));
    color: #fff;
    font-family: 'Russo One', sans-serif;
    font-size: clamp(7px, 0.75vw, 10px);
    text-align: center;
    padding: 10px 2px 3px;
    letter-spacing: 0.04em;
    pointer-events: none;
    text-transform: uppercase;
    opacity: 0.82;
  }
  .slot.locked-p1 { box-shadow: inset 0 0 0 3px #f5d24e, 0 0 18px rgba(245, 210, 78, 0.8); }
  .slot.locked-p2 { box-shadow: inset 0 0 0 3px #66c8ff, 0 0 18px rgba(102, 200, 255, 0.8); }
  .slot.locked-p1.locked-p2 { box-shadow: inset 0 0 0 3px #ffffff, 0 0 22px rgba(255,255,255,0.9); }

  /* ============================================================ */
  /*  CURSORS (use TRANSFORM for smooth movement, no layout thrash)*/
  /* ============================================================ */
  .cursor {
    position: absolute;
    left: 0; top: 0;
    width: var(--slot); height: var(--slot);
    pointer-events: none;
    z-index: 20;
    transform: translate3d(0, 0, 0);
    transition: transform 90ms cubic-bezier(.2, .8, .25, 1);
    will-change: transform;
  }
  .cursor-box {
    position: absolute;
    inset: -4px;
    border: 3px solid #f5d24e;
    box-shadow:
      0 0 18px rgba(245, 210, 78, 0.95),
      inset 0 0 18px rgba(245, 210, 78, 0.55);
    animation: cursorPulse 0.9s ease-in-out infinite alternate;
  }
  .cursor.p2 .cursor-box {
    border-color: #66c8ff;
    box-shadow:
      0 0 18px rgba(102, 200, 255, 0.95),
      inset 0 0 18px rgba(102, 200, 255, 0.55);
  }
  @keyframes cursorPulse {
    from { filter: brightness(1); }
    to   { filter: brightness(1.35); }
  }
  .cursor-label {
    position: absolute;
    bottom: -10px; right: -10px;
    background: linear-gradient(to bottom, #ffeb73 0%, #d99c00 100%);
    color: #2a1a00;
    font-family: 'Bowlby One', sans-serif;
    padding: 3px 9px 1px;
    font-size: clamp(11px, 1vw, 15px);
    letter-spacing: 0.06em;
    border: 1px solid rgba(0,0,0,0.5);
    box-shadow: 0 2px 6px rgba(0,0,0,0.6);
    transform: skewX(-12deg);
  }
  .cursor.p2 .cursor-label {
    background: linear-gradient(to bottom, #b8e8ff 0%, #1c80c8 100%);
    color: #04243d;
  }

  /* ============================================================ */
  /*  PREVIEW PANELS  (comic book covers, MvC3 style)              */
  /* ============================================================ */
  .preview {
    position: absolute;
    top: 50%;
    width: clamp(240px, 26vw, 400px);
    height: clamp(380px, 40vw, 620px);
    z-index: 15;
    filter: drop-shadow(0 0 30px rgba(120, 200, 255, 0.7))
            drop-shadow(0 0 70px rgba(80, 160, 255, 0.45));
  }
  .preview.p1 {
    left: 1.5vw;
    transform: translateY(-50%) perspective(1600px) rotateY(24deg);
    transform-origin: right center;
  }
  .preview.p2 {
    right: 1.5vw;
    transform: translateY(-50%) perspective(1600px) rotateY(-24deg);
    transform-origin: left center;
  }
  .cover {
    width: 100%; height: 100%;
    position: relative;
    overflow: hidden;
    border: 4px solid #0a0a0a;
    box-shadow: 0 18px 50px rgba(0,0,0,0.85);
    /* Dark cosmic base — character image overlays on top */
    background:
      radial-gradient(ellipse at 50% 30%,
        rgba(60, 80, 150, 0.55) 0%,
        rgba(20, 30, 80, 0.4) 40%,
        rgba(5, 5, 25, 1) 90%),
      linear-gradient(180deg, #0d1a4a 0%, #1a0930 60%, #050010 100%);
  }
  /* Warm orange sunburst rays radiating from behind the featured character */
  .cover-burst {
    position: absolute; inset: 0;
    z-index: 0;
    pointer-events: none;
    /* Soft warm halo behind the featured character — no rigid spokes */
    background:
      radial-gradient(circle at 50% 42%,
        rgba(255, 220, 150, 0.7) 0%,
        rgba(255, 150, 60, 0.45) 16%,
        rgba(200, 70, 30, 0.25) 38%,
        rgba(60, 10, 30, 0) 65%),
      radial-gradient(ellipse 70% 90% at 50% 50%,
        rgba(255, 180, 100, 0.18) 0%,
        transparent 70%);
    filter: blur(1.5px);
    mix-blend-mode: screen;
    opacity: 0;
    transition: opacity 400ms ease;
  }
  .cover.has-feature .cover-burst { opacity: 1; }
  /* Layered character art - each pick gets its own region on the cover.
     All picks stay FULL SIZE and FULL COLOR; they just occupy different
     positions so every selection is clearly visible (matches MvC3 reference). */
  .cover-characters {
    position: absolute; inset: 0;
    z-index: 1;
    overflow: hidden;
  }
  .cover-char {
    position: absolute;
    background-size: cover;
    background-position: center top;
    background-repeat: no-repeat;
    transition: top 450ms cubic-bezier(.2,.9,.3,1.2),
                left 450ms cubic-bezier(.2,.9,.3,1.2),
                right 450ms cubic-bezier(.2,.9,.3,1.2),
                bottom 450ms cubic-bezier(.2,.9,.3,1.2),
                width 450ms cubic-bezier(.2,.9,.3,1.2),
                height 450ms cubic-bezier(.2,.9,.3,1.2);
    animation: charAppear 520ms cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes charAppear {
    from { transform: scale(1.15) translateY(6%); opacity: 0; }
    to   { transform: none; opacity: 1; }
  }

  /* 1 pick - fills the cover */
  .cover-characters[data-count="1"] .cover-char[data-recency="0"] {
    top: 0; left: 0; width: 100%; height: 100%; z-index: 5;
  }

  /* 2 picks - diagonal: older = upper-left, newer = lower-right */
  .cover-characters[data-count="2"] .cover-char[data-recency="1"] {
    top: 0; left: -4%; width: 74%; height: 82%; z-index: 4;
  }
  .cover-characters[data-count="2"] .cover-char[data-recency="0"] {
    bottom: 0; right: -4%; width: 80%; height: 90%; z-index: 5;
  }

  /* 3 picks - two in back at top, newest big in front-bottom */
  .cover-characters[data-count="3"] .cover-char[data-recency="2"] {
    top: 0; left: -6%; width: 60%; height: 66%; z-index: 3;
  }
  .cover-characters[data-count="3"] .cover-char[data-recency="1"] {
    top: 6%; right: -6%; width: 60%; height: 66%; z-index: 4;
  }
  .cover-characters[data-count="3"] .cover-char[data-recency="0"] {
    bottom: 0; left: 12%; width: 78%; height: 86%; z-index: 5;
  }

  /* 4 picks - corners + newest big in front-bottom */
  .cover-characters[data-count="4"] .cover-char[data-recency="3"] {
    top: 0; left: -6%; width: 56%; height: 60%; z-index: 2;
  }
  .cover-characters[data-count="4"] .cover-char[data-recency="2"] {
    top: 0; right: -6%; width: 56%; height: 60%; z-index: 3;
  }
  .cover-characters[data-count="4"] .cover-char[data-recency="1"] {
    bottom: 0; left: -6%; width: 56%; height: 60%; z-index: 4;
  }
  .cover-characters[data-count="4"] .cover-char[data-recency="0"] {
    bottom: 0; right: -6%; width: 66%; height: 72%; z-index: 5;
  }

  /* P2 mirrors the horizontal positions (older picks fan opposite side) */
  .preview.p2 .cover-characters[data-count="2"] .cover-char[data-recency="1"] { left: auto; right: -4%; }
  .preview.p2 .cover-characters[data-count="2"] .cover-char[data-recency="0"] { right: auto; left: -4%; }
  .preview.p2 .cover-characters[data-count="3"] .cover-char[data-recency="2"] { left: auto; right: -6%; }
  .preview.p2 .cover-characters[data-count="3"] .cover-char[data-recency="1"] { right: auto; left: -6%; }
  .preview.p2 .cover-characters[data-count="3"] .cover-char[data-recency="0"] { left: auto; right: 12%; }
  .preview.p2 .cover-characters[data-count="4"] .cover-char[data-recency="3"] { left: auto; right: -6%; }
  .preview.p2 .cover-characters[data-count="4"] .cover-char[data-recency="2"] { right: auto; left: -6%; }
  .preview.p2 .cover-characters[data-count="4"] .cover-char[data-recency="1"] { left: auto; right: -6%; }
  .preview.p2 .cover-characters[data-count="4"] .cover-char[data-recency="0"] { right: auto; left: -6%; }
  /* Empty state */
  .cover-characters.empty::after {
    content: '';
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at center 35%, rgba(255,200,100,0.15), transparent 70%);
  }
  /* dark gradient overlay so text stays readable */
  .cover-shade {
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg, rgba(0,0,0,0.5) 0%, rgba(0,0,0,0) 22%, rgba(0,0,0,0) 60%, rgba(0,0,0,0.78) 95%);
    z-index: 2;
    pointer-events: none;
  }

  /* Hover slot: the cursor's currently-hovered character is rendered
     as an additional .cover-char.hover inside .cover-characters so it
     inherits the same count=1/2/3/4 layout rules as confirmed picks
     (i.e. layered alongside, not overlaid on top). The .hover modifier
     makes it translucent and adds a scan-tint so the audience reads
     it as "unconfirmed". */
  .cover-char.hover {
    opacity: 0.62;
    filter: saturate(0.55) brightness(0.92) contrast(0.95);
  }
  .cover-char.hover::after {
    content: '';
    position: absolute; inset: 0;
    background:
      linear-gradient(180deg,
        rgba(120, 210, 255, 0.22) 0%,
        rgba(120, 210, 255, 0)    25%,
        rgba(120, 210, 255, 0)    75%,
        rgba(120, 210, 255, 0.22) 100%),
      repeating-linear-gradient(0deg,
        rgba(120, 210, 255, 0.08) 0 1px,
        transparent 1px 4px);
    mix-blend-mode: screen;
    pointer-events: none;
  }
  .preview.p1 .cover-char.hover::after {
    background:
      linear-gradient(180deg,
        rgba(245, 210, 78, 0.20) 0%,
        rgba(245, 210, 78, 0)    25%,
        rgba(245, 210, 78, 0)    75%,
        rgba(245, 210, 78, 0.20) 100%),
      repeating-linear-gradient(0deg,
        rgba(245, 210, 78, 0.08) 0 1px,
        transparent 1px 4px);
  }
  /* Corner badge that reads "PREVIEW" so it's obvious this isn't a lock-in */
  .cover-hover-badge {
    position: absolute;
    top: 38%;
    right: -4px;
    background: linear-gradient(180deg, #1d2d4a 0%, #0a1428 100%);
    color: #b8e8ff;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(8px, 0.8vw, 11px);
    letter-spacing: 0.22em;
    padding: 3px 8px 2px;
    border: 1px solid rgba(120, 210, 255, 0.7);
    box-shadow: 0 0 12px rgba(80, 180, 255, 0.55);
    transform: skewX(-10deg) translateX(0);
    opacity: 0;
    transition: opacity 220ms ease, transform 220ms ease;
    text-shadow: 0 1px 0 #000;
  }
  .preview.p1 .cover-hover-badge {
    color: #ffeb73;
    border-color: rgba(245, 210, 78, 0.75);
    box-shadow: 0 0 12px rgba(245, 210, 78, 0.55);
  }
  .cover.preview-hover .cover-hover-badge {
    opacity: 1;
    transform: skewX(-10deg) translateX(-6px);
    animation: previewBadgePulse 0.9s ease-in-out infinite alternate;
  }
  @keyframes previewBadgePulse {
    from { filter: brightness(1); }
    to   { filter: brightness(1.35); }
  }
  /* When in hover state, the big character name shifts to a dimmer,
     italicized look — the audience sees the candidate name but knows
     it's not locked in yet. */
  .cover.preview-hover .big-name {
    color: rgba(255, 255, 255, 0.62);
    -webkit-text-stroke: 1px rgba(0, 0, 0, 0.55);
    text-shadow:
      0 3px 0 rgba(0, 0, 0, 0.85),
      0 0 14px rgba(255, 255, 255, 0.25);
    font-style: italic;
  }

  /* Spine - visible thickness of the book on outer edge */
  .spine {
    position: absolute;
    top: -4px; bottom: -4px;
    width: 26px;
    background:
      linear-gradient(to right, rgba(0,0,0,0.65) 0%, rgba(0,0,0,0.1) 100%),
      repeating-linear-gradient(to bottom,
        #b62416 0 8px, #8a1a10 8px 16px);
    border: 2px solid #0a0a0a;
    display: flex; align-items: center; justify-content: center;
    color: #fff7e2;
    font-size: clamp(9px, 0.85vw, 13px);
    letter-spacing: 0.18em;
    font-family: 'Bowlby One', sans-serif;
    writing-mode: vertical-rl;
    text-orientation: mixed;
    text-shadow: 0 1px 0 #000, 0 0 6px rgba(255,200,100,0.5);
    white-space: nowrap;
    padding: 14px 0;
    overflow: hidden;
    z-index: 5;
  }
  .preview.p1 .spine { right: -26px; }
  .preview.p2 .spine { left: -26px; }

  /* MvC3-style stacked logo block in top-left corner */
  .logo-block {
    position: absolute;
    top: 12px; left: 14px;
    z-index: 6;
    font-family: 'Bowlby One', 'Impact', sans-serif;
    line-height: 1;
    filter: drop-shadow(0 2px 4px rgba(0,0,0,0.9));
  }
  .logo-marvel-row {
    display: flex; align-items: flex-end; gap: 6px;
  }
  .logo-marvel {
    background: #d70a0a;
    color: #fff;
    padding: 4px 12px 3px;
    font-size: clamp(13px, 1.5vw, 22px);
    letter-spacing: 0.06em;
    border: 1.5px solid #000;
    text-shadow: 0 1px 0 #5a0000;
    display: inline-block;
  }
  .logo-vs {
    font-family: 'Bangers', cursive;
    color: #fff;
    font-size: clamp(11px, 1.05vw, 16px);
    font-style: italic;
    letter-spacing: 0.02em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.95), 0 0 4px rgba(0,0,0,0.9);
    padding-bottom: 4px;
  }
  .logo-capcom-row {
    display: flex; align-items: flex-end; gap: 4px;
    margin-top: 2px;
  }
  .logo-capcom {
    color: #f1a31a;
    font-size: clamp(15px, 1.7vw, 26px);
    -webkit-text-stroke: 1.5px #000;
    paint-order: stroke fill;
    text-shadow: 0 2px 0 #000;
    letter-spacing: 0.04em;
    transform: skewX(-4deg);
  }
  .logo-num {
    color: #f1a31a;
    font-size: clamp(28px, 3.2vw, 50px);
    -webkit-text-stroke: 2px #000;
    paint-order: stroke fill;
    text-shadow: 0 3px 0 #000;
    line-height: 0.85;
    transform: skewX(-4deg);
  }
  .logo-sub {
    margin-top: 2px;
    color: #ffd24a;
    font-family: 'Bangers', cursive;
    font-size: clamp(9px, 0.95vw, 13px);
    letter-spacing: 0.04em;
    text-shadow: 0 1px 2px rgba(0,0,0,0.95);
    font-style: italic;
    max-width: 85%;
    line-height: 1.05;
  }

  /* Player flag in top-right corner */
  .player-flag {
    position: absolute;
    top: 14px; right: 14px;
    z-index: 4;
    background: rgba(0,0,0,0.78);
    color: #fff;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(11px, 1vw, 16px);
    padding: 4px 12px;
    letter-spacing: 0.14em;
    border: 1px solid rgba(255,255,255,0.5);
    transform: skewX(-10deg);
    box-shadow: 0 2px 8px rgba(0,0,0,0.6);
  }

  /* Big horizontal character name at bottom */
  .big-name {
    position: absolute;
    bottom: 6%;
    right: 5%;
    left: 38%;
    z-index: 5;
    font-family: 'Bowlby One', 'Impact', sans-serif;
    font-size: clamp(36px, 5.2vw, 78px);
    color: #ffffff;
    letter-spacing: 0.04em;
    line-height: 0.88;
    text-shadow:
      0 4px 0 #000,
      0 6px 12px rgba(0,0,0,0.9),
      0 0 14px rgba(255,255,255,0.4);
    -webkit-text-stroke: 2px #000;
    paint-order: stroke fill;
    pointer-events: none;
    text-align: right;
    text-transform: uppercase;
    white-space: nowrap;
    overflow: hidden;
  }
  .big-name.empty {
    color: rgba(255,255,255,0.28);
    -webkit-text-stroke: 1px rgba(0,0,0,0.5);
  }

  /* ASSIST TYPE panel (centered upper-middle of cover) */
  .assist-panel {
    position: absolute;
    top: 15%;
    left: 7%;
    right: 7%;
    z-index: 5;
    font-family: 'Bowlby One', 'Impact', sans-serif;
    pointer-events: none;
  }
  .assist-header {
    display: inline-block;
    padding: 4px 22px 3px 16px;
    font-size: clamp(10px, 1.05vw, 16px);
    color: #ffeb73;
    letter-spacing: 0.16em;
    background: linear-gradient(180deg, #0a1f12 0%, #08160d 100%);
    border: 2px solid #5cdb6e;
    border-bottom: none;
    border-radius: 14px 14px 0 0;
    text-shadow: 0 1px 0 #000;
    margin-left: 12%;
    box-shadow: 0 -2px 12px rgba(92, 219, 110, 0.5);
    position: relative;
    z-index: 2;
  }
  .assist-body {
    background:
      repeating-linear-gradient(0deg, rgba(92, 219, 110, 0.22) 0 1px, transparent 1px 9px),
      repeating-linear-gradient(90deg, rgba(92, 219, 110, 0.22) 0 1px, transparent 1px 9px),
      linear-gradient(180deg, rgba(10, 35, 22, 0.92), rgba(5, 22, 12, 0.92));
    border: 2px solid #5cdb6e;
    border-radius: 10px;
    padding: 6px 12px;
    display: flex;
    align-items: center;
    gap: 10px;
    box-shadow:
      0 0 18px rgba(92, 219, 110, 0.55),
      inset 0 0 14px rgba(92, 219, 110, 0.15);
  }
  .assist-type-label {
    color: #ffeb73;
    font-size: clamp(9px, 0.9vw, 13px);
    letter-spacing: 0.1em;
    text-shadow: 0 1px 0 #000;
    line-height: 0.9;
  }
  .assist-greek {
    color: #5cdb6e;
    font-size: clamp(32px, 3.6vw, 54px);
    line-height: 0.85;
    text-shadow:
      0 0 14px rgba(92, 219, 110, 0.85),
      0 3px 0 #000;
    -webkit-text-stroke: 1.5px #000;
    paint-order: stroke fill;
    font-style: italic;
    font-family: 'Bowlby One', serif;
  }
  .assist-name {
    color: #ffffff;
    font-size: clamp(13px, 1.5vw, 22px);
    letter-spacing: 0.04em;
    text-shadow: 0 2px 0 #000, 0 0 6px rgba(0,0,0,0.8);
    flex: 1;
    text-align: right;
    text-transform: capitalize;
  }
  .assist-tags {
    display: flex;
    gap: 6px;
    margin-top: 5px;
    padding-left: 14%;
  }
  .assist-tag {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(9px, 0.95vw, 14px);
    padding: 4px 14px 3px;
    letter-spacing: 0.12em;
    color: #fff;
    text-shadow: 0 1px 0 #000;
    border: 1.5px solid #000;
    position: relative;
    line-height: 1;
  }
  .assist-tag.shot {
    background: linear-gradient(180deg, #5fd0e0 0%, #2a8395 100%);
    border-radius: 3px;
  }
  .assist-tag.front {
    background: linear-gradient(180deg, #ffc448 0%, #b87b0a 100%);
    border-radius: 3px;
    padding-right: 22px;
  }
  .assist-tag.front::after {
    content: '';
    position: absolute;
    right: 5px; top: 50%;
    width: 0; height: 0;
    border-style: solid;
    border-width: 5px 0 5px 7px;
    border-color: transparent transparent transparent #fff;
    transform: translateY(-50%);
    filter: drop-shadow(0 1px 0 #000);
  }

  /* Small team-pick thumbnail strip at bottom-left, above the barcode */
  .stack {
    position: absolute;
    bottom: 8%;
    left: 5%;
    width: 30%;
    height: 12%;
    z-index: 5;
    display: flex; flex-direction: row;
    gap: 4px;
    pointer-events: none;
  }
  .stack .slot-pick {
    flex: 1;
    background: rgba(11,29,58,0.6);
    border: 2px solid rgba(255,255,255,0.7);
    overflow: hidden;
    position: relative;
    opacity: 0;
    transition: opacity 250ms ease;
    min-height: 0;
    box-shadow: 0 3px 10px rgba(0,0,0,0.75);
  }
  .stack .slot-pick.filled {
    opacity: 1;
    animation: dropIn 450ms cubic-bezier(.2,.9,.3,1.2);
  }
  @keyframes dropIn {
    from { transform: scale(1.6) rotate(-6deg); opacity: 0; }
    to   { transform: none; opacity: 1; }
  }
  .stack .slot-pick img { width: 100%; height: 100%; object-fit: cover; object-position: center top; }
  .stack .slot-pick .pick-name {
    position: absolute; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    color: #fff;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(7px, 0.7vw, 10px);
    text-align: center;
    padding: 1px 2px;
    letter-spacing: 0.04em;
  }

  /* Proper UPC barcode in bottom-left */
  .barcode {
    position: absolute;
    bottom: 8px;
    width: 68px;
    height: 32px;
    background: #fff;
    border: 1px solid #000;
    padding: 2px 3px 0;
    display: flex; flex-direction: column;
    z-index: 6;
  }
  .preview.p1 .barcode { left: 12px; }
  .preview.p2 .barcode { right: 12px; }
  .barcode-bars {
    flex: 1;
    background-image:
      repeating-linear-gradient(to right,
        #000 0, #000 1px, transparent 1px, transparent 2px,
        #000 2px, #000 4px, transparent 4px, transparent 5px,
        #000 5px, #000 6px, transparent 6px, transparent 8px,
        #000 8px, #000 11px, transparent 11px, transparent 12px,
        #000 12px, #000 13px, transparent 13px, transparent 15px);
    background-size: 15px 100%;
  }
  .barcode-num {
    color: #000;
    font-family: 'Courier New', monospace;
    font-size: 6px;
    text-align: center;
    line-height: 1;
    padding-top: 1px;
    letter-spacing: 0.6px;
  }

  /* ============================================================ */
  /*  STATUS HINT                                                  */
  /* ============================================================ */
  .hint {
    position: absolute;
    bottom: 1vh; left: 50%;
    transform: translateX(-50%);
    font-family: 'Russo One', sans-serif;
    font-size: clamp(9px, 0.85vw, 12px);
    color: rgba(200, 220, 255, 0.55);
    letter-spacing: 0.16em;
    z-index: 5;
    text-align: center;
    white-space: nowrap;
  }

  /* ============================================================ */
  /*  VS SCREEN                                                    */
  /* ============================================================ */
  .vs-screen {
    position: fixed; inset: 0;
    z-index: 100;
    opacity: 0;
    pointer-events: none;
    background: #000209;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    justify-items: center;
    overflow: hidden;
  }
  .vs-screen .starfield, .vs-screen .arc, .vs-screen .sphere-grid {
    z-index: 0;
  }
  .vs-screen.visible {
    opacity: 1;
    pointer-events: auto;
    animation: vsEnter 800ms cubic-bezier(.2,.9,.3,1.05);
  }
  @keyframes vsEnter {
    0%   { opacity: 0; transform: scale(1.15); filter: blur(8px); }
    60%  { opacity: 1; transform: scale(0.98); filter: blur(0); }
    100% { opacity: 1; transform: scale(1); }
  }

  .vs-side {
    position: relative;
    display: flex; flex-direction: column;
    align-items: center;
    gap: 14px;
    padding: 0 4vw;
    z-index: 6;
  }
  .vs-side-label {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(22px, 3vw, 44px);
    letter-spacing: 0.2em;
    color: #fff;
    text-shadow: 0 0 18px rgba(120,200,255,0.9), 0 4px 0 #0a2150;
    opacity: 0;
    animation: fadeInLate 600ms ease 1500ms forwards;
  }
  .vs-side.p1 .vs-side-label { color: #ffeb73; text-shadow: 0 0 18px rgba(255,210,70,0.95), 0 4px 0 #4a2a00; }
  .vs-side.p2 .vs-side-label { color: #b8e8ff; text-shadow: 0 0 18px rgba(102,200,255,0.95), 0 4px 0 #042a4a; }

  /* Portraits positioned diagonally to mimic dramatic team pose */
  .vs-portraits {
    position: relative;
    width: clamp(220px, 30vw, 460px);
    height: clamp(280px, 38vw, 580px);
  }
  .vs-portrait {
    position: absolute;
    width: clamp(150px, 18vw, 280px);
    height: clamp(220px, 26vw, 400px);
    overflow: visible;
    transform: scale(0);
    opacity: 0;
    animation: portraitPop 700ms cubic-bezier(.2, .9, .3, 1.3) forwards;
    filter: drop-shadow(0 14px 24px rgba(0, 0, 0, 0.85))
            drop-shadow(0 0 18px rgba(255, 255, 255, 0.25));
  }
  .vs-side.p1 .vs-portrait {
    filter: drop-shadow(0 14px 24px rgba(0,0,0,0.85))
            drop-shadow(0 0 22px rgba(245,210,78,0.55));
  }
  .vs-side.p2 .vs-portrait {
    filter: drop-shadow(0 14px 24px rgba(0,0,0,0.85))
            drop-shadow(0 0 22px rgba(102,200,255,0.55));
  }

  /* P1 lineup: front-most portrait closer to center, back portrait higher-left */
  .vs-side.p1 .vs-portrait:nth-child(1) { top: 4%;  left: 4%;  z-index: 1; transform-origin: bottom right; }
  .vs-side.p1 .vs-portrait:nth-child(2) { bottom: 4%; right: 4%;  z-index: 3; width: clamp(180px, 22vw, 340px); height: clamp(180px, 22vw, 340px); transform-origin: bottom right; }
  .vs-side.p1 .vs-portrait:nth-child(3) { top: 28%; left: 30%; z-index: 2; }
  .vs-side.p1 .vs-portrait:nth-child(4) { bottom: 22%; left: 14%; z-index: 2; }

  /* P2 lineup mirrors P1 */
  .vs-side.p2 .vs-portrait:nth-child(1) { top: 4%;  right: 4%; z-index: 1; transform-origin: bottom left; }
  .vs-side.p2 .vs-portrait:nth-child(2) { bottom: 4%; left: 4%; z-index: 3; width: clamp(180px, 22vw, 340px); height: clamp(180px, 22vw, 340px); transform-origin: bottom left; }
  .vs-side.p2 .vs-portrait:nth-child(3) { top: 28%; right: 30%; z-index: 2; }
  .vs-side.p2 .vs-portrait:nth-child(4) { bottom: 22%; right: 14%; z-index: 2; }

  .vs-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center top;
    display: block;
    /* Soft edge fade so the photo blends into the background instead of looking like a card */
    -webkit-mask-image: radial-gradient(ellipse 80% 90% at center 35%, black 55%, transparent 100%);
            mask-image: radial-gradient(ellipse 80% 90% at center 35%, black 55%, transparent 100%);
    /* Start as silhouette, then resolve to color */
    filter: brightness(0) contrast(2);
    animation: silhouetteToColor 1100ms ease-out forwards;
    animation-delay: 1100ms;
  }
  @keyframes silhouetteToColor {
    0%   { filter: brightness(0) contrast(2); }
    35%  { filter: brightness(0) contrast(2); }
    65%  { filter: brightness(0.5) contrast(1.6); }
    100% { filter: brightness(1) contrast(1); }
  }
  .vs-portrait .pname {
    position: absolute;
    left: 50%; bottom: -10px;
    transform: translateX(-50%);
    color: #fff;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(11px, 1.1vw, 18px);
    text-align: center;
    padding: 0;
    background: none;
    letter-spacing: 0.08em;
    text-shadow: 0 2px 0 #000, 0 0 10px rgba(0,0,0,0.9), 0 0 18px rgba(0,0,0,0.7);
    white-space: nowrap;
    opacity: 0;
    animation: fadeInLate 500ms ease 1700ms forwards;
  }
  @keyframes fadeInLate { to { opacity: 1; } }

  @keyframes portraitPop {
    0%   { transform: scale(0) rotate(-15deg); opacity: 0; }
    60%  { transform: scale(1.08) rotate(3deg); opacity: 1; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .vs-portrait:nth-child(1) { animation-delay: 450ms; }
  .vs-portrait:nth-child(2) { animation-delay: 650ms; }
  .vs-portrait:nth-child(3) { animation-delay: 850ms; }
  .vs-portrait:nth-child(4) { animation-delay: 1050ms; }

  /* ----- The bright light transition (MvC3 confirm-flash) ----- */
  .vs-white-burst {
    position: absolute;
    left: 50%; top: 50%;
    width: 60vmin; height: 60vmin;
    transform: translate(-50%, -50%) scale(0.1);
    border-radius: 50%;
    background: radial-gradient(circle,
      rgba(255,255,255,1) 0%,
      rgba(255,250,220,0.95) 18%,
      rgba(255,220,140,0.6) 40%,
      rgba(255,180,90,0.25) 60%,
      transparent 85%);
    z-index: 4;
    opacity: 0;
    mix-blend-mode: screen;
    pointer-events: none;
    filter: blur(2px);
  }
  .vs-screen.visible .vs-white-burst {
    animation: whiteBurst 2000ms cubic-bezier(.15,.7,.2,1) forwards;
  }
  @keyframes whiteBurst {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.05); }
    12%  { opacity: 1; transform: translate(-50%, -50%) scale(1.8); }
    50%  { opacity: 0.85; transform: translate(-50%, -50%) scale(2.6); }
    100% { opacity: 0.25; transform: translate(-50%, -50%) scale(3.4); }
  }

  /* Soft sparkle backdrop (replaces the rigid 12-spoke ray pattern) */
  .vs-rays {
    position: absolute;
    left: 50%; top: 50%;
    width: 180vmax; height: 180vmax;
    transform: translate(-50%, -50%);
    pointer-events: none;
    z-index: 3;
    opacity: 0;
    background:
      radial-gradient(2px 2px at 18% 22%, rgba(255,255,255,0.95) 50%, transparent 60%),
      radial-gradient(1.6px 1.6px at 72% 18%, rgba(255,230,255,0.9) 50%, transparent 60%),
      radial-gradient(2.4px 2.4px at 32% 64%, rgba(255,255,255,0.85) 50%, transparent 60%),
      radial-gradient(1.4px 1.4px at 82% 72%, rgba(255,210,235,0.9) 50%, transparent 60%),
      radial-gradient(1.8px 1.8px at 48% 38%, rgba(255,255,255,0.8) 50%, transparent 60%),
      radial-gradient(1.2px 1.2px at 12% 78%, rgba(255,255,255,0.7) 50%, transparent 60%),
      radial-gradient(2px 2px at 88% 42%, rgba(255,220,240,0.85) 50%, transparent 60%),
      radial-gradient(1.5px 1.5px at 58% 88%, rgba(255,255,255,0.75) 50%, transparent 60%),
      radial-gradient(ellipse at 50% 50%,
        rgba(255, 120, 190, 0.18) 0%,
        rgba(180, 60, 140, 0.10) 30%,
        transparent 65%);
    filter: blur(0.4px);
  }
  .vs-screen.visible .vs-rays {
    animation: raysFade 2400ms ease-out forwards;
  }
  @keyframes raysFade {
    0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.6); }
    20%  { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    60%  { opacity: 0.8; transform: translate(-50%, -50%) scale(1.05); }
    100% { opacity: 0.45; transform: translate(-50%, -50%) scale(1.1); }
  }

  .vs-center {
    position: relative;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(140px, 26vw, 400px);
    line-height: 0.85;
    color: #ec3a78;
    -webkit-text-stroke: 2px #ffffff;
    letter-spacing: -0.02em;
    transform: scale(0);
    animation: vsPop 700ms cubic-bezier(.2,.9,.25,1.2) forwards;
    animation-delay: 700ms;
    filter:
      drop-shadow(0 0 12px rgba(255, 90, 160, 0.95))
      drop-shadow(0 0 40px rgba(236, 58, 120, 0.85))
      drop-shadow(0 0 90px rgba(236, 58, 120, 0.6));
    z-index: 5;
  }
  @keyframes vsPop {
    0%   { transform: scale(2.4); opacity: 0; }
    55%  { transform: scale(0.9); opacity: 1; }
    100% { transform: scale(1); opacity: 1; }
  }
  .vs-shock {
    position: absolute;
    width: 60vmin; height: 60vmin;
    left: 50%; top: 50%;
    transform: translate(-50%, -50%) scale(0);
    border-radius: 50%;
    background: radial-gradient(circle, rgba(255,180,210,0.4) 0%, rgba(236,58,120,0.25) 35%, transparent 70%);
    z-index: 1;
    animation: shock 1100ms ease-out forwards;
    animation-delay: 1300ms;
  }
  @keyframes shock {
    0%   { transform: translate(-50%, -50%) scale(0); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
  }
  .vs-replay {
    position: absolute;
    bottom: 4vh; left: 50%;
    transform: translateX(-50%);
    font-family: 'Russo One', sans-serif;
    font-size: clamp(12px, 1vw, 16px);
    color: rgba(255,255,255,0.7);
    letter-spacing: 0.18em;
    opacity: 0;
    animation: fadeIn 600ms ease forwards;
    animation-delay: 1400ms;
    z-index: 5;
  }
  @keyframes fadeIn { to { opacity: 1; } }

  .vs-flash {
    position: fixed; inset: 0;
    background: white;
    z-index: 200;
    opacity: 0;
    pointer-events: none;
  }
  .vs-flash.go { animation: flash 600ms ease-out; }
  @keyframes flash {
    0%   { opacity: 0; }
    20%  { opacity: 1; }
    100% { opacity: 0; }
  }

  /* ============================================================ */
  /*  FIGHT SCREEN                                                */
  /* ============================================================ */
  .fight-screen {
    position: fixed; inset: 0;
    z-index: 90;
    /* Fight-scene wallpaper (this stage image only applies to the fight
       screen — select/VS/ulti are unaffected). Gradient kept as fallback. */
    background: url("fight-bg.jpg") center / cover no-repeat,
                radial-gradient(ellipse at 50% 100%, #1a0a3a 0%, #050018 70%, #000 100%);
    opacity: 0;
    pointer-events: none;
    overflow: hidden;
    transition: opacity 400ms ease;
  }
  .fight-screen.visible {
    opacity: 1;
    pointer-events: auto;
  }
  /* Let the fight-scene wallpaper show through: drop the starfield's opaque
     dark fill (keep only its twinkling stars layered over the stage image). */
  .fight-screen .starfield { z-index: 0; opacity: 0.6; background-color: transparent; }

  .fight-time-wrap {
    position: absolute;
    top: 1.5vh; left: 50%;
    transform: translateX(-50%);
    text-align: center;
    z-index: 10;
  }
  .fight-time-label {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(14px, 1.6vw, 24px);
    letter-spacing: 0.42em;
    color: #e7f4ff;
    text-shadow: 0 0 12px rgba(120,210,255,0.95);
    margin-right: -0.42em;
  }
  .fight-time {
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(34px, 5vw, 70px);
    color: #f6d758;
    line-height: 0.85;
    text-shadow: 0 0 14px rgba(255, 220, 80, 0.95), 0 0 28px rgba(255, 180, 0, 0.6);
  }

  .fight-hud {
    position: absolute;
    top: 2vh;
    width: 47vw;          /* fixed width so both HUDs are guaranteed equal */
    display: flex;
    align-items: flex-start;
    gap: 12px;
    z-index: 12;
  }
  .fight-hud.p1 { left: 1.5vw; }
  .fight-hud.p2 { right: 1.5vw; }

  .fight-portrait {
    width: clamp(110px, 10vw, 170px);
    height: clamp(110px, 10vw, 170px);
    background: #0b1d3a;
    border: 4px solid #000;
    box-shadow: 0 0 0 3px #ffd24a, 0 8px 22px rgba(0,0,0,0.9);
    overflow: hidden;
    flex: 0 0 auto;
    position: relative;
  }
  .fight-hud.p2 .fight-portrait {
    box-shadow: 0 0 0 3px #66c8ff, 0 8px 22px rgba(0,0,0,0.9);
  }
  .fight-portrait img {
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 18%;
    display: block;
  }

  .fight-bars {
    flex: 1 1 0;          /* fill remaining HUD width = equal on both sides */
    min-width: 0;
    display: flex; flex-direction: column;
    gap: 8px;
  }

  .hp-track {
    position: relative;
    height: clamp(38px, 4.2vw, 60px);
    background: linear-gradient(180deg, #1a1a1a 0%, #0a0a0a 100%);
    border: 3px solid #000;
    box-shadow:
      inset 0 0 0 2px rgba(255,255,255,0.22),
      0 6px 16px rgba(0,0,0,0.8);
    transform: skewX(-22deg);
    overflow: hidden;
  }
  .hp-track.right { transform: skewX(22deg); }

  .hp-fill {
    position: absolute;
    top: 0; bottom: 0; left: 0;
    width: 100%;
    background: linear-gradient(180deg,
      #ffeb73 0%, #ffd24a 22%, #f6a01b 55%, #c54d10 100%);
    transition: width 280ms cubic-bezier(.2,.7,.2,1), background 280ms ease;
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.4), inset 0 -3px 0 rgba(0,0,0,0.35);
  }
  .hp-track.right .hp-fill { left: auto; right: 0; }
  .hp-fill.low {
    background: linear-gradient(180deg, #ff8a55 0%, #ff4a2a 35%, #c41a10 100%);
    animation: hpPulse 0.7s ease-in-out infinite alternate;
  }
  @keyframes hpPulse {
    from { filter: brightness(1); }
    to   { filter: brightness(1.4); }
  }
  .hp-fill.empty { background: linear-gradient(180deg, #555 0%, #222 100%); }

  .hp-name {
    position: absolute;
    top: 50%; left: 18px;
    transform: skewX(22deg) translateY(-50%);
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(22px, 2.6vw, 36px);
    color: #fff;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    text-shadow: 0 3px 0 #000, 0 0 14px rgba(0,0,0,0.9);
    pointer-events: none;
    z-index: 2;
    white-space: nowrap;
  }
  .hp-track.right .hp-name {
    left: auto; right: 18px;
    transform: skewX(-22deg) translateY(-50%);
  }

  .reserve-list {
    display: flex;
    gap: 6px;
    padding-left: 6%;
  }
  .reserve-list.right { padding-left: 0; padding-right: 6%; justify-content: flex-end; }
  .reserve-pill {
    height: clamp(20px, 2.2vw, 30px);
    min-width: clamp(110px, 14vw, 200px);
    background: linear-gradient(180deg, #ffd24a 0%, #c0801a 100%);
    border: 2.5px solid #000;
    box-shadow: 0 3px 10px rgba(0,0,0,0.75);
    transform: skewX(-22deg);
    display: flex; align-items: center; justify-content: center;
    color: #2a1500;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(13px, 1.4vw, 18px);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .fight-hud.p2 .reserve-pill {
    transform: skewX(22deg);
    background: linear-gradient(180deg, #b8e8ff 0%, #1c80c8 100%);
    color: #03263d;
  }
  .reserve-pill > span { transform: skewX(22deg); display: inline-block; }
  .fight-hud.p2 .reserve-pill > span { transform: skewX(-22deg); }
  .reserve-pill.ko {
    background: linear-gradient(180deg, #444 0%, #222 100%);
    color: rgba(255,255,255,0.4);
    text-decoration: line-through;
  }

  .fight-flash {
    position: fixed; inset: 0;
    z-index: 210;
    opacity: 0;
    pointer-events: none;
    background: white;
  }
  .fight-flash.medium { animation: flashMed 380ms ease-out; }
  .fight-flash.super  { animation: flashSup 900ms ease-out; }
  @keyframes flashMed {
    0%   { opacity: 0; background: white; }
    25%  { opacity: 0.55; }
    100% { opacity: 0; }
  }
  @keyframes flashSup {
    0%   { opacity: 0; }
    10%  { opacity: 1; background: white; }
    35%  { opacity: 0.85; background: #fff7c0; }
    65%  { opacity: 0.6;  background: #ff6c2a; }
    100% { opacity: 0; }
  }

  /* Dim layer that darkens the background during a super, MvC-style */
  .fight-dim {
    position: fixed; inset: 0;
    z-index: 208;
    background: radial-gradient(ellipse at center, rgba(0,0,0,0.0) 0%, rgba(0,0,0,0.85) 100%);
    opacity: 0;
    pointer-events: none;
    transition: opacity 200ms ease;
  }
  .fight-dim.on { opacity: 1; }

  /* ----------- PROJECTILE (medium attack: Hadoken-style energy ball) ----------- */
  .projectile {
    position: fixed;
    top: 48%;
    width: clamp(180px, 22vw, 360px);
    height: clamp(80px, 9vw, 140px);
    margin-top: calc(clamp(80px, 9vw, 140px) / -2);
    left: -40vw;
    z-index: 216;
    opacity: 0;
    pointer-events: none;
    filter: drop-shadow(0 0 30px #ff8a40) drop-shadow(0 0 80px #ff4020);
  }
  .projectile.fire-p1 { animation: projFlyL2R 1500ms cubic-bezier(.4,.1,.7,1) forwards; }
  .projectile.fire-p2 { animation: projFlyR2L 1500ms cubic-bezier(.4,.1,.7,1) forwards; }
  @keyframes projFlyL2R {
    0%   { left: -40vw; transform: scale(0.4); opacity: 0; }
    12%  { opacity: 1; transform: scale(1); }
    88%  { opacity: 1; transform: scale(1); }
    100% { left: 110vw; opacity: 0; transform: scale(1.35); }
  }
  @keyframes projFlyR2L {
    0%   { left: 110vw; transform: scaleX(-1) scale(0.4); opacity: 0; }
    12%  { opacity: 1; transform: scaleX(-1) scale(1); }
    88%  { opacity: 1; transform: scaleX(-1) scale(1); }
    100% { left: -40vw; opacity: 0; transform: scaleX(-1) scale(1.35); }
  }
  /* Comet tail behind the orb */
  .proj-tail {
    position: absolute;
    top: 50%; left: 0;
    width: 75%; height: 55%;
    transform: translateY(-50%);
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 90, 20, 0.25) 25%,
      rgba(255, 160, 50, 0.55) 55%,
      rgba(255, 230, 140, 0.85) 80%,
      rgba(255, 255, 240, 0.95) 100%);
    border-radius: 50% 50% 50% 50% / 60% 60% 50% 50%;
    filter: blur(3px);
  }
  /* Bright burning orb at the head */
  .proj-core {
    position: absolute;
    top: 50%; right: 5%;
    width: 60%; height: 95%;
    transform: translateY(-50%);
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(255,250,200,0.95) 18%,
        rgba(255,200,80,0.85) 42%,
        rgba(255,110,30,0.6) 65%,
        transparent 85%);
    border-radius: 50%;
    filter: blur(1px);
  }
  /* Spinning energy ring around the orb */
  .proj-spin {
    position: absolute;
    top: 50%; right: 18%;
    width: 35%; height: 70%;
    transform: translateY(-50%) rotate(0deg);
    background:
      radial-gradient(ellipse 100% 30% at 50% 50%,
        rgba(255, 220, 100, 0.65) 0%,
        rgba(255, 140, 40, 0.4) 50%,
        transparent 80%);
    border-radius: 50%;
    animation: projSpin 280ms linear infinite;
    filter: blur(0.5px);
  }
  @keyframes projSpin {
    to { transform: translateY(-50%) rotate(360deg); }
  }

  /* P2-color variant (cool teal/cyan plasma instead of warm fire) */
  .projectile.cool {
    filter: drop-shadow(0 0 30px #4ad8ff) drop-shadow(0 0 80px #1080d0);
  }
  .projectile.cool .proj-tail {
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(20, 130, 230, 0.25) 25%,
      rgba(80, 200, 255, 0.55) 55%,
      rgba(180, 240, 255, 0.85) 80%,
      rgba(240, 250, 255, 0.95) 100%);
  }
  .projectile.cool .proj-core {
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(220, 245, 255, 0.95) 18%,
        rgba(120, 210, 255, 0.85) 42%,
        rgba(30, 120, 220, 0.6) 65%,
        transparent 85%);
  }
  .projectile.cool .proj-spin {
    background:
      radial-gradient(ellipse 100% 30% at 50% 50%,
        rgba(120, 220, 255, 0.65) 0%,
        rgba(30, 130, 220, 0.4) 50%,
        transparent 80%);
  }

  /* ----------- IMPACT BURST (lands when projectile hits opponent side) -------- */
  .impact-burst {
    position: fixed;
    top: 48%;
    width: clamp(220px, 28vw, 460px);
    height: clamp(220px, 28vw, 460px);
    margin-top: calc(clamp(220px, 28vw, 460px) / -2);
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(255,240,180,0.95) 8%,
        rgba(255,170,50,0.7) 22%,
        rgba(255,80,20,0.5) 45%,
        transparent 70%);
    border-radius: 50%;
    filter: blur(2px) drop-shadow(0 0 50px #ff7030);
  }
  .impact-burst.go { animation: impactPop 550ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  .impact-burst.cool {
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(220,240,255,0.95) 8%,
        rgba(80,200,255,0.7) 22%,
        rgba(20,100,220,0.5) 45%,
        transparent 70%);
    filter: blur(2px) drop-shadow(0 0 50px #4ac0ff);
  }
  @keyframes impactPop {
    0%   { transform: scale(0.1) rotate(-20deg); opacity: 0; }
    25%  { transform: scale(1.15) rotate(8deg); opacity: 1; }
    55%  { transform: scale(1) rotate(0); opacity: 1; }
    100% { transform: scale(1.4) rotate(0); opacity: 0; }
  }

  /* ----------- PUNCH HIT FX (one fires on every damage tick) ----------------- */
  /* Self-centering burst (translate keeps it centered on its left/top point) */
  .hit-burst {
    position: fixed;
    width: clamp(130px, 16vw, 280px);
    height: clamp(130px, 16vw, 280px);
    z-index: 219;
    opacity: 0;
    pointer-events: none;
    transform: translate(-50%, -50%) scale(0);
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(255,240,180,0.95) 10%,
        rgba(255,170,50,0.75) 30%,
        rgba(255,80,20,0.5) 55%,
        transparent 78%);
    border-radius: 50%;
    filter: blur(1.5px) drop-shadow(0 0 28px #ff7030);
  }
  .hit-burst.cool {
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(220,240,255,0.95) 10%,
        rgba(90,200,255,0.75) 30%,
        rgba(20,110,220,0.5) 55%,
        transparent 78%);
    filter: blur(1.5px) drop-shadow(0 0 28px #4ac0ff);
  }
  .hit-burst.go { animation: hitBurstPop 420ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  @keyframes hitBurstPop {
    0%   { transform: translate(-50%,-50%) scale(0.1) rotate(-25deg); opacity: 0; }
    30%  { transform: translate(-50%,-50%) scale(1.15) rotate(10deg); opacity: 1; }
    60%  { transform: translate(-50%,-50%) scale(1)    rotate(0);     opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.35) rotate(0);     opacity: 0; }
  }
  /* Comic-style hit word ("POW!", "BAM!", ...) */
  .hit-word {
    position: fixed;
    z-index: 221;
    pointer-events: none;
    font-family: 'Bangers', 'Bowlby One', cursive;
    font-size: clamp(38px, 5.5vw, 100px);
    color: #fff;
    -webkit-text-stroke: 4px #1a0a00;
    paint-order: stroke fill;
    letter-spacing: 0.02em;
    text-shadow: 0 4px 0 #000, 0 0 20px rgba(255,180,40,0.9);
    transform: translate(-50%, -50%) scale(0) rotate(-8deg);
    opacity: 0;
    white-space: nowrap;
  }
  .hit-word.cool { text-shadow: 0 4px 0 #000, 0 0 20px rgba(90,180,255,0.9); }
  .hit-word.go { animation: hitWordPop 560ms cubic-bezier(.2,.9,.3,1.4) forwards; }
  @keyframes hitWordPop {
    0%   { transform: translate(-50%,-50%) scale(0)   rotate(-12deg); opacity: 0; }
    30%  { transform: translate(-50%,-50%) scale(1.2) rotate(6deg);   opacity: 1; }
    65%  { transform: translate(-50%,-50%) scale(1)   rotate(-2deg);  opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1.1) rotate(0);      opacity: 0; }
  }

  /* ----------- HYPER BEAM (super move: giant beam crosses screen) ------------- */
  .hyper-beam {
    position: fixed;
    top: 50%;
    left: 0;
    width: 0;
    height: clamp(140px, 22vh, 320px);
    margin-top: calc(clamp(140px, 22vh, 320px) / -2);
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    overflow: visible;
  }
  .hyper-beam.fire-p1 { animation: beamL2R 1400ms cubic-bezier(.3,.0,.7,1) forwards; }
  .hyper-beam.fire-p2 { animation: beamR2L 1400ms cubic-bezier(.3,.0,.7,1) forwards; }
  @keyframes beamL2R {
    0%   { left: 0;    width: 0;     opacity: 0; }
    12%  { left: 0;    width: 25vw;  opacity: 1; }
    50%  { left: 0;    width: 100vw; opacity: 1; }
    85%  { left: 0;    width: 100vw; opacity: 1; }
    100% { left: 0;    width: 100vw; opacity: 0; }
  }
  @keyframes beamR2L {
    0%   { left: 100vw; width: 0;     opacity: 0; }
    12%  { left: 75vw;  width: 25vw;  opacity: 1; }
    50%  { left: 0;     width: 100vw; opacity: 1; }
    85%  { left: 0;     width: 100vw; opacity: 1; }
    100% { left: 0;     width: 100vw; opacity: 0; }
  }
  .beam-glow {
    position: absolute;
    inset: -40% 0;
    background: radial-gradient(ellipse 60% 100% at 50% 50%,
      rgba(255, 240, 180, 0.55) 0%,
      rgba(255, 140, 40, 0.35) 35%,
      transparent 70%);
    filter: blur(20px);
  }
  .beam-core {
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg,
        rgba(255, 110, 30, 0)   0%,
        rgba(255, 180, 50, 0.7) 20%,
        rgba(255, 240, 180, 1)  45%,
        rgba(255, 255, 255, 1)  50%,
        rgba(255, 240, 180, 1)  55%,
        rgba(255, 180, 50, 0.7) 80%,
        rgba(255, 110, 30, 0)   100%);
    filter: blur(1.5px) drop-shadow(0 0 40px #ff8030);
    animation: beamPulse 120ms ease-in-out infinite alternate;
  }
  @keyframes beamPulse {
    from { filter: blur(1.5px) brightness(0.95) drop-shadow(0 0 30px #ff8030); }
    to   { filter: blur(1.5px) brightness(1.15) drop-shadow(0 0 55px #ffb060); }
  }
  .beam-tip {
    position: absolute;
    top: 50%; right: -3vw;
    width: 10vw; height: 200%;
    transform: translateY(-50%);
    background: radial-gradient(circle at 30% 50%,
      rgba(255,255,255,1) 0%,
      rgba(255,240,180,0.9) 15%,
      rgba(255,140,40,0.6) 40%,
      transparent 70%);
    filter: blur(3px);
  }
  .hyper-beam.fire-p2 .beam-tip {
    right: auto; left: -3vw;
    background: radial-gradient(circle at 70% 50%,
      rgba(255,255,255,1) 0%,
      rgba(255,240,180,0.9) 15%,
      rgba(255,140,40,0.6) 40%,
      transparent 70%);
  }
  .hyper-beam.cool .beam-glow {
    background: radial-gradient(ellipse 60% 100% at 50% 50%,
      rgba(180, 230, 255, 0.55) 0%,
      rgba(40, 140, 230, 0.35) 35%,
      transparent 70%);
  }
  .hyper-beam.cool .beam-core {
    background:
      linear-gradient(180deg,
        rgba(30, 120, 220, 0)   0%,
        rgba(80, 200, 255, 0.7) 20%,
        rgba(220, 245, 255, 1)  45%,
        rgba(255, 255, 255, 1)  50%,
        rgba(220, 245, 255, 1)  55%,
        rgba(80, 200, 255, 0.7) 80%,
        rgba(30, 120, 220, 0)   100%);
    filter: blur(1.5px) drop-shadow(0 0 40px #50b8ff);
  }
  .hyper-beam.cool .beam-tip {
    background: radial-gradient(circle at 30% 50%,
      rgba(255,255,255,1) 0%,
      rgba(220,245,255,0.9) 15%,
      rgba(80,180,255,0.6) 40%,
      transparent 70%);
  }

  /* ----------- QUAKE SUPER (ground shockwave + rising cracks) --------------- */
  .quake-wave {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 75vh;
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    background:
      radial-gradient(ellipse 90% 60% at 50% 100%,
        rgba(255, 230, 130, 0.85) 0%,
        rgba(255, 150, 40, 0.7) 22%,
        rgba(200, 60, 20, 0.45) 45%,
        transparent 75%);
    filter: blur(6px) drop-shadow(0 -10px 60px #ff8030);
    transform-origin: center bottom;
  }
  .quake-wave.go { animation: quakeRise 1300ms cubic-bezier(.2,.7,.3,1) forwards; }
  .quake-wave.cool {
    background: radial-gradient(ellipse 90% 60% at 50% 100%,
      rgba(120, 220, 255, 0.85) 0%,
      rgba(40, 150, 235, 0.7) 22%,
      rgba(20, 80, 180, 0.45) 45%,
      transparent 75%);
    filter: blur(6px) drop-shadow(0 -10px 60px #50b8ff);
  }
  @keyframes quakeRise {
    0%   { opacity: 0; transform: scaleY(0.05) scaleX(0.3); }
    25%  { opacity: 1; transform: scaleY(1.1) scaleX(1.1); }
    55%  { opacity: 1; transform: scaleY(1) scaleX(1); }
    100% { opacity: 0; transform: scaleY(1.4) scaleX(1.3); }
  }
  .quake-crack {
    position: fixed;
    bottom: 0;
    width: 14px;
    height: 0;
    background: linear-gradient(to top,
      rgba(255, 255, 220, 1) 0%,
      rgba(255, 200, 80, 0.95) 35%,
      rgba(255, 100, 30, 0.7) 70%,
      transparent 100%);
    z-index: 218;
    opacity: 0;
    pointer-events: none;
    filter: blur(1px) drop-shadow(0 0 18px #ff8030);
    transform-origin: bottom center;
  }
  .quake-crack.cool {
    background: linear-gradient(to top,
      rgba(220, 240, 255, 1) 0%,
      rgba(120, 210, 255, 0.95) 35%,
      rgba(30, 130, 220, 0.7) 70%,
      transparent 100%);
    filter: blur(1px) drop-shadow(0 0 18px #50b8ff);
  }
  .quake-crack.go { animation: crackRise 800ms cubic-bezier(.2,.8,.3,1) forwards; }
  @keyframes crackRise {
    0%   { height: 0; opacity: 0; }
    20%  { height: 70vh; opacity: 1; }
    65%  { height: 75vh; opacity: 0.9; }
    100% { height: 80vh; opacity: 0; }
  }

  /* ----------- SLASH SUPER (rapid diagonal blade marks across screen) -------- */
  .slash-mark {
    position: fixed;
    top: 50%; left: 50%;
    width: 160vw;
    height: 14px;
    margin-top: -7px;
    margin-left: -80vw;
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 255, 255, 0) 15%,
      rgba(255, 245, 200, 0.7) 35%,
      rgba(255, 255, 255, 1) 50%,
      rgba(255, 245, 200, 0.7) 65%,
      rgba(255, 255, 255, 0) 85%,
      transparent 100%);
    filter: blur(2px) drop-shadow(0 0 18px #fff5a0) drop-shadow(0 0 40px #ff8030);
    transform-origin: center center;
  }
  .slash-mark.cool {
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(220, 240, 255, 0) 15%,
      rgba(180, 230, 255, 0.7) 35%,
      rgba(255, 255, 255, 1) 50%,
      rgba(180, 230, 255, 0.7) 65%,
      rgba(220, 240, 255, 0) 85%,
      transparent 100%);
    filter: blur(2px) drop-shadow(0 0 18px #cdf2ff) drop-shadow(0 0 40px #50b8ff);
  }
  .slash-mark.go { animation: slashCut 380ms cubic-bezier(.4,0,.2,1) forwards; }
  @keyframes slashCut {
    0%   { transform: scaleX(0) rotate(var(--ang, 25deg)); opacity: 0; }
    25%  { transform: scaleX(1) rotate(var(--ang, 25deg)); opacity: 1; }
    75%  { transform: scaleX(1) rotate(var(--ang, 25deg)); opacity: 1; }
    100% { transform: scaleX(1) rotate(var(--ang, 25deg)); opacity: 0; }
  }

  /* ----------- PLASMA SUPER (growing orb + ring shockwaves) ------------------ */
  .plasma-orb {
    position: fixed;
    top: 48%; left: 50%;
    width: 80px; height: 80px;
    margin: -40px 0 0 -40px;
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(255,240,180,0.95) 18%,
        rgba(255,150,40,0.85) 45%,
        rgba(180,40,20,0.6) 70%,
        transparent 100%);
    border-radius: 50%;
    filter: blur(2px) drop-shadow(0 0 40px #ff8030) drop-shadow(0 0 100px #ff5020);
  }
  .plasma-orb.cool {
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(220,245,255,0.95) 18%,
        rgba(100,210,255,0.85) 45%,
        rgba(20,90,200,0.6) 70%,
        transparent 100%);
    filter: blur(2px) drop-shadow(0 0 40px #50b8ff) drop-shadow(0 0 100px #1c80d8);
  }
  .plasma-orb.go { animation: plasmaGrow 1300ms cubic-bezier(.2,.7,.3,1) forwards; }
  @keyframes plasmaGrow {
    0%   { width: 40px; height: 40px; margin: -20px 0 0 -20px; opacity: 0; }
    25%  { width: 220px; height: 220px; margin: -110px 0 0 -110px; opacity: 1; }
    65%  { width: 60vmin; height: 60vmin; margin: -30vmin 0 0 -30vmin; opacity: 1; }
    100% { width: 180vmin; height: 180vmin; margin: -90vmin 0 0 -90vmin; opacity: 0; }
  }
  .plasma-ring {
    position: fixed;
    top: 48%; left: 50%;
    width: 100px; height: 100px;
    margin: -50px 0 0 -50px;
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    border: 6px solid rgba(255, 230, 140, 0.85);
    border-radius: 50%;
    box-shadow:
      inset 0 0 25px rgba(255, 150, 40, 0.7),
      0 0 40px rgba(255, 130, 40, 0.95),
      0 0 90px rgba(255, 80, 20, 0.5);
  }
  .plasma-ring.cool {
    border-color: rgba(180, 230, 255, 0.9);
    box-shadow:
      inset 0 0 25px rgba(80, 200, 255, 0.7),
      0 0 40px rgba(80, 180, 255, 0.95),
      0 0 90px rgba(20, 110, 220, 0.5);
  }
  .plasma-ring.go { animation: ringExpand 1000ms cubic-bezier(.15,.6,.3,1) forwards; }
  @keyframes ringExpand {
    0%   { width: 60px;  height: 60px;  margin: -30px 0 0 -30px;  opacity: 0; border-width: 8px; }
    15%  { opacity: 1; }
    100% { width: 220vmin; height: 220vmin; margin: -110vmin 0 0 -110vmin; opacity: 0; border-width: 1px; }
  }

  /* ----------- RUSH SUPER (rapid multi-impact bursts) ----------------------- */
  .rush-hit {
    position: fixed;
    width: clamp(140px, 18vw, 280px);
    height: clamp(140px, 18vw, 280px);
    z-index: 217;
    opacity: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(255,240,180,0.95) 12%,
        rgba(255,160,50,0.8) 30%,
        rgba(255,70,20,0.5) 55%,
        transparent 78%);
    border-radius: 50%;
    filter: blur(1.5px) drop-shadow(0 0 30px #ff8030);
    transform: translate(-50%, -50%) scale(0);
  }
  .rush-hit.cool {
    background:
      radial-gradient(circle at 50% 50%,
        rgba(255,255,255,1) 0%,
        rgba(220,245,255,0.95) 12%,
        rgba(80,210,255,0.8) 30%,
        rgba(20,100,220,0.5) 55%,
        transparent 78%);
    filter: blur(1.5px) drop-shadow(0 0 30px #50b8ff);
  }
  .rush-hit.go { animation: rushPop 420ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  @keyframes rushPop {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(-30deg); opacity: 0; }
    35%  { transform: translate(-50%, -50%) scale(1.15) rotate(8deg); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.35) rotate(0); opacity: 0; }
  }

  /* ----------- SPARK FIELD (particles flying during super) ------------------- */
  .spark-field {
    position: fixed; inset: 0;
    z-index: 218;
    pointer-events: none;
    overflow: hidden;
  }
  .spark {
    position: absolute;
    width: 6px; height: 6px;
    background: radial-gradient(circle, #fff 0%, #ffeb73 40%, transparent 70%);
    border-radius: 50%;
    opacity: 0;
    filter: drop-shadow(0 0 6px #ff8030);
  }
  .spark.cool {
    background: radial-gradient(circle, #fff 0%, #b8e8ff 40%, transparent 70%);
    filter: drop-shadow(0 0 6px #50b8ff);
  }
  .spark.go { animation: sparkFly var(--dur, 900ms) ease-out forwards; }
  @keyframes sparkFly {
    0%   { transform: translate(0, 0) scale(0); opacity: 0; }
    15%  { transform: translate(var(--dx, 0), var(--dy, 0)) scale(1.4); opacity: 1; }
    100% { transform: translate(calc(var(--dx, 0) * 4), calc(var(--dy, 0) * 4)) scale(0.3); opacity: 0; }
  }
  /* Long motion-blur streak sparks (the After Effects-style trails) */
  .spark-streak {
    position: absolute;
    width: 80px; height: 3px;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 200, 80, 0.4) 30%,
      rgba(255, 255, 220, 1) 80%,
      #fff 100%);
    transform-origin: right center;
    opacity: 0;
    pointer-events: none;
    filter: blur(0.8px) drop-shadow(0 0 8px #ff8030);
    border-radius: 50%;
  }
  .spark-streak.cool {
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(80, 180, 255, 0.4) 30%,
      rgba(220, 245, 255, 1) 80%,
      #fff 100%);
    filter: blur(0.8px) drop-shadow(0 0 8px #50b8ff);
  }
  .spark-streak.go { animation: streakFly var(--dur, 700ms) cubic-bezier(.2,.7,.4,1) forwards; }
  @keyframes streakFly {
    0%   { transform: translate(0,0) rotate(var(--ang, 0deg)) scaleX(0); opacity: 0; }
    20%  { transform: translate(0,0) rotate(var(--ang, 0deg)) scaleX(1); opacity: 1; }
    100% { transform: translate(var(--dx, 0), var(--dy, 0)) rotate(var(--ang, 0deg)) scaleX(0.4); opacity: 0; }
  }
  /* Tiny twinkles that linger longer */
  .twinkle {
    position: absolute;
    width: 3px; height: 3px;
    background: #fff;
    box-shadow: 0 0 6px #fff, 0 0 18px rgba(255, 220, 120, 0.9);
    border-radius: 50%;
    opacity: 0;
    pointer-events: none;
  }
  .twinkle.cool { box-shadow: 0 0 6px #fff, 0 0 18px rgba(120, 210, 255, 0.9); }
  .twinkle.go { animation: twinkleLife 1300ms ease-in-out forwards; }
  @keyframes twinkleLife {
    0%   { transform: scale(0); opacity: 0; }
    20%  { transform: scale(1.4); opacity: 1; }
    50%  { transform: scale(1); opacity: 0.95; }
    100% { transform: scale(0.6); opacity: 0; }
  }

  /* ----------- HIT COUNTER ("8 HITS!" style) --------------------------------- */
  .hit-counter {
    position: absolute;
    top: 58%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 222;
    font-family: 'Bowlby One', 'Impact', sans-serif;
    color: #fff;
    line-height: 0.85;
    text-align: center;
    opacity: 0;
    pointer-events: none;
    display: flex; align-items: baseline; gap: 0.15em;
    transform-origin: center center;
  }
  .hit-num {
    font-size: clamp(60px, 9vw, 150px);
    color: #ffeb73;
    -webkit-text-stroke: 4px #2a0a00;
    paint-order: stroke fill;
    text-shadow:
      0 0 15px rgba(255, 180, 40, 0.95),
      0 0 40px rgba(255, 100, 20, 0.7),
      0 6px 0 #4a1500;
    display: inline-block;
    transform: skewX(-10deg);
  }
  .hit-label {
    font-size: clamp(30px, 4.5vw, 70px);
    color: #ff5a3c;
    -webkit-text-stroke: 3px #2a0a00;
    paint-order: stroke fill;
    text-shadow:
      0 0 10px rgba(255, 80, 40, 0.95),
      0 4px 0 #2a0500;
    display: inline-block;
    transform: skewX(-10deg);
  }
  .hit-counter.show { animation: hitCounterPop 950ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  @keyframes hitCounterPop {
    0%   { transform: translate(-50%, -50%) scale(0) rotate(-15deg); opacity: 0; }
    20%  { transform: translate(-50%, -50%) scale(1.25) rotate(4deg); opacity: 1; }
    55%  { transform: translate(-50%, -50%) scale(1) rotate(0); opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.4) rotate(0); opacity: 0; }
  }

  .fight-fx {
    position: fixed; inset: 0;
    z-index: 215;
    pointer-events: none;
    overflow: hidden;
  }
  .fx-streak {
    position: absolute;
    top: 30%; left: -50%;
    width: 200%;
    height: 25%;
    background: linear-gradient(90deg,
      transparent 0%,
      rgba(255, 240, 180, 0) 10%,
      rgba(255, 240, 180, 0.55) 45%,
      rgba(255, 200, 80, 0.85) 50%,
      rgba(255, 240, 180, 0.55) 55%,
      transparent 90%);
    opacity: 0;
    mix-blend-mode: screen;
    filter: blur(2px);
  }
  .fx-streak.go { animation: streakSweep 850ms cubic-bezier(.4,.1,.2,1) forwards; }
  @keyframes streakSweep {
    0%   { transform: translateX(-30%) skewX(-22deg); opacity: 0; }
    25%  { opacity: 1; }
    100% { transform: translateX(60%) skewX(-22deg); opacity: 0; }
  }

  .fx-text {
    position: absolute;
    top: 38%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    font-family: 'Bowlby One', 'Impact', sans-serif;
    font-size: clamp(48px, 10vw, 180px);
    color: #fff5a0;
    -webkit-text-stroke: 5px #1a0000;
    paint-order: stroke fill;
    letter-spacing: -0.01em;
    line-height: 0.9;
    white-space: nowrap;
    text-shadow:
      0 0 18px rgba(255, 180, 40, 0.95),
      0 0 50px rgba(255, 110, 30, 0.8),
      0 8px 0 #4a1500;
    opacity: 0;
    z-index: 220;
  }
  .fx-text.show { animation: fxBurst 1100ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  .fx-text.p2-color {
    color: #cdf2ff;
    text-shadow:
      0 0 18px rgba(80, 180, 255, 0.95),
      0 0 50px rgba(30, 130, 255, 0.8),
      0 8px 0 #04263d;
  }
  /* Red "K.O.!" treatment used when a teammate falls mid-match */
  .fx-text.ko-color {
    color: #ff4a3a;
    -webkit-text-stroke: 6px #ffffff;
    text-shadow:
      0 0 22px rgba(255, 70, 50, 0.98),
      0 0 60px rgba(255, 30, 20, 0.85),
      0 0 120px rgba(200, 10, 10, 0.6),
      0 10px 0 #3a0000;
    letter-spacing: 0.04em;
  }
  @keyframes fxBurst {
    0%   { transform: translate(-50%, -50%) scale(0)   rotate(-14deg); opacity: 0; }
    18%  { transform: translate(-50%, -50%) scale(1.25) rotate(3deg);  opacity: 1; }
    55%  { transform: translate(-50%, -50%) scale(1)    rotate(-1deg); opacity: 1; }
    80%  { transform: translate(-50%, -50%) scale(1)    rotate(0);     opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.5)  rotate(0);     opacity: 0; }
  }

  .fight-ko {
    position: fixed;
    top: 58%; left: 50%;     /* sits below the top HUD so the HP bars stay readable */
    transform: translate(-50%, -50%) scale(0);
    z-index: 230;
    pointer-events: none;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(80px, 14vw, 240px);
    color: #ff3a3a;
    -webkit-text-stroke: 6px #fff;
    paint-order: stroke fill;
    text-shadow:
      0 0 30px rgba(255, 60, 60, 0.95),
      0 0 80px rgba(255, 30, 30, 0.75),
      0 10px 0 #2a0000;
    opacity: 0;
    letter-spacing: 0.04em;
  }
  /* Win banner can be a long string ("AARON AND KENG I WINS!") — shrink it,
     cap the width and allow wrapping so it stays inside the frame. */
  .fight-ko.wins {
    font-size: clamp(40px, 7vw, 116px);
    -webkit-text-stroke: 4px #fff;
    letter-spacing: 0.02em;
    line-height: 0.98;
    max-width: 92vw;
    white-space: normal;
    text-align: center;
    text-wrap: balance;
  }
  .fight-ko.show { animation: koPop 1400ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  @keyframes koPop {
    0%   { transform: translate(-50%, -50%) scale(2.5) rotate(-12deg); opacity: 0; }
    20%  { transform: translate(-50%, -50%) scale(0.9) rotate(4deg);   opacity: 1; }
    50%  { transform: translate(-50%, -50%) scale(1)   rotate(0);      opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1)   rotate(0);      opacity: 1; }
  }

  /* Round-start countdown: 3 / 2 / 1 / GO, big center text */
  .fight-count {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%) scale(0);
    z-index: 235;
    pointer-events: none;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(120px, 22vw, 380px);
    color: #ffd23c;
    -webkit-text-stroke: 7px #fff;
    paint-order: stroke fill;
    text-shadow:
      0 0 40px rgba(255, 200, 40, 0.95),
      0 0 90px rgba(255, 150, 0, 0.7),
      0 12px 0 #3a1c00;
    opacity: 0;
    letter-spacing: 0.03em;
  }
  .fight-count.go {
    color: #46e86b;
    text-shadow:
      0 0 40px rgba(70, 232, 107, 0.95),
      0 0 90px rgba(0, 200, 80, 0.7),
      0 12px 0 #06330f;
  }
  .fight-count.tick { animation: countPop 900ms cubic-bezier(.2,.85,.25,1.3) forwards; }
  @keyframes countPop {
    0%   { transform: translate(-50%, -50%) scale(2.4); opacity: 0; }
    18%  { transform: translate(-50%, -50%) scale(0.92); opacity: 1; }
    45%  { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    80%  { transform: translate(-50%, -50%) scale(1);    opacity: 1; }
    100% { transform: translate(-50%, -50%) scale(1.15); opacity: 0; }
  }

  /* Ulti video — full-screen takeover when M2's ultimate triggers */
  .ulti-video {
    position: fixed;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 245;
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 220ms ease;
  }
  .ulti-video.show {
    opacity: 1;
    pointer-events: auto;
  }

  /* ----------- ALPHA-WEBM EFFECT OVERLAYS (from the anime FX pack) ----------- */
  /* All are transparent VP9 clips; no blend mode needed. Hidden until .playing. */
  .fx-video {
    position: fixed;
    pointer-events: none;
    opacity: 0;
  }
  .fx-video.playing { opacity: 1; }

  /* Per-punch hit burst — ~38vw, centered on a point set inline by JS */
  .fx-hit {
    width: 38vw;
    height: auto;
    transform: translate(-50%, -50%);
    z-index: 219;
    filter: drop-shadow(0 0 24px rgba(255,200,120,0.5));
  }
  /* Fireball explosion at the impact point */
  .fx-fire {
    width: 46vw;
    height: auto;
    transform: translate(-50%, -50%);
    z-index: 218;
    filter: drop-shadow(0 0 40px rgba(255,150,60,0.6));
  }
  /* K.O. splat fills the screen, sits BEHIND the .fight-ko text (z=230) */
  .fx-ko {
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    z-index: 225;
  }
  /* Expanding shockwave (centered on its left/top point). screen blend so
     the bright energy adds into the scene rather than sitting flatly. */
  .fx-shock {
    width: 90vw;
    height: auto;
    transform: translate(-50%, -50%);
    z-index: 222;
    mix-blend-mode: screen;
  }
  /* Lightsaber-duel residue: bright energy clips on black, added via screen
     blend. Width/position are set per-cue by playFxVideo. */
  .fx-saber {
    width: 40vw;
    height: auto;
    transform: translate(-50%, -50%);
    z-index: 223;
    mix-blend-mode: screen;
    filter: drop-shadow(0 0 26px rgba(120, 200, 255, 0.45));
  }

  /* Punch impact — sharp white flash, centered on a block column */
  .fx-punch {
    width: clamp(180px, 22vw, 380px);
    height: auto;
    transform: translate(-50%, -50%);
    z-index: 221;
    mix-blend-mode: screen;
  }
  /* Block — crystalline clash, cool/contained, centered on a block column */
  .fx-block {
    width: clamp(170px, 20vw, 340px);
    height: auto;
    transform: translate(-50%, -50%);
    z-index: 221;
    filter: drop-shadow(0 0 18px rgba(180,210,255,0.7));
  }

  /* Whiff — a fast motion-swipe for a missed punch (no impact, no damage) */
  .whiff {
    position: fixed;
    width: clamp(160px, 18vw, 300px);
    height: clamp(40px, 5vw, 80px);
    transform: translate(-50%, -50%) rotate(-18deg) scaleX(0);
    z-index: 221;
    pointer-events: none;
    opacity: 0;
    background: linear-gradient(90deg,
      transparent 0%, rgba(255,255,255,0.05) 20%,
      rgba(255,255,255,0.55) 55%, rgba(255,255,255,0.95) 80%, transparent 100%);
    border-radius: 50%;
    filter: blur(3px);
    mix-blend-mode: screen;
  }
  .whiff.go { animation: whiffSwipe 360ms cubic-bezier(.3,.1,.2,1) forwards; }
  @keyframes whiffSwipe {
    0%   { transform: translate(-50%,-50%) rotate(-18deg) scaleX(0)   translateX(-30px); opacity: 0; }
    25%  { opacity: 0.9; }
    100% { transform: translate(-50%,-50%) rotate(-18deg) scaleX(1.2) translateX(40px);  opacity: 0; }
  }

  /* ----------- CHALLENGER APPROACHING screen ----------------------- */
  .challenger {
    position: fixed;
    inset: 0;
    z-index: 250;          /* full takeover, above everything */
    background: #000;
    opacity: 0;
    pointer-events: none;
    transition: opacity 160ms ease;
  }
  .challenger.show { opacity: 1; pointer-events: auto; }
  .challenger-vid {
    position: absolute;
    inset: 0;
    width: 100vw;
    height: 100vh;
    object-fit: cover;
    display: block;
  }
  /* The entering character's face, sat over the white burst on the right */
  .challenger-face {
    position: absolute;
    left: 62%;            /* burst center, right-of-middle */
    top: 44%;
    transform: translate(-50%, -50%) scale(0.2);
    width: clamp(220px, 30vw, 460px);
    height: clamp(260px, 36vw, 560px);
    background-size: cover;
    background-position: center 20%;
    background-repeat: no-repeat;
    border-radius: 16px;
    box-shadow: 0 0 40px rgba(255,255,255,0.9), 0 0 90px rgba(255,160,160,0.7);
    /* soft-feather the edges so the face melts into the white burst */
    -webkit-mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, #000 55%, transparent 82%);
            mask-image: radial-gradient(ellipse 70% 70% at 50% 45%, #000 55%, transparent 82%);
    opacity: 0;
  }
  .challenger.show .challenger-face {
    animation: challengerFacePop 600ms cubic-bezier(.2,.85,.25,1.3) forwards;
    animation-delay: 120ms;
  }
  @keyframes challengerFacePop {
    0%   { transform: translate(-50%,-50%) scale(0.2) rotate(-6deg); opacity: 0; }
    35%  { transform: translate(-50%,-50%) scale(1.08) rotate(2deg); opacity: 1; }
    70%  { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
    100% { transform: translate(-50%,-50%) scale(1) rotate(0); opacity: 1; }
  }

  .fight-screen.shake { animation: screenShake 250ms ease-in-out; }
  @keyframes screenShake {
    0%, 100% { transform: translate(0, 0); }
    20% { transform: translate(-6px, 3px); }
    40% { transform: translate(5px, -4px); }
    60% { transform: translate(-4px, 5px); }
    80% { transform: translate(6px, -2px); }
  }

  /* Audio prompt - shown if browser blocks autoplay */
  .audio-prompt {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    background: rgba(0, 20, 50, 0.92);
    border: 2px solid #66c8ff;
    box-shadow: 0 0 40px rgba(102, 200, 255, 0.6);
    color: #fff;
    padding: 24px 36px;
    font-family: 'Bowlby One', sans-serif;
    font-size: clamp(16px, 1.6vw, 24px);
    letter-spacing: 0.1em;
    text-align: center;
    z-index: 300;
    cursor: pointer;
    transition: opacity 300ms ease;
  }
  .audio-prompt.hidden { opacity: 0; pointer-events: none; }
  .audio-prompt small {
    display: block;
    font-family: 'Russo One', sans-serif;
    font-size: 0.55em;
    letter-spacing: 0.18em;
    margin-top: 8px;
    opacity: 0.8;
  }
</style>
</head>
<body>

<div class="stage" id="stage">

  <!-- Starry sky -->
  <div class="starfield"></div>

  <!-- Top and bottom globe arcs (the curved cyan rims) -->
  <div class="arc top"></div>
  <div class="arc bottom"></div>

  <!-- Warped sphere meridian/parallel grid -->
  <svg class="sphere-grid" id="sphereGrid" viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet"></svg>

  <!-- TIME / infinity at top -->
  <div class="time-counter">
    <div class="time-label" id="timeLabel">TIME</div>
    <div class="time-infinity">&#8734;</div>
  </div>

  <!-- LEFT preview panel: Player 1 -->
  <div class="preview p1" id="preview-p1">
    <div class="cover" id="cover-p1">
      <div class="cover-burst"></div>
      <div class="cover-characters empty" id="characters-p1"></div>
      <div class="cover-hover-badge">PREVIEW</div>
      <div class="cover-shade"></div>
      <div class="spine" id="spine-p1"></div>
      <div class="logo-block" id="logo-p1"></div>
      <div class="player-flag" id="flag-p1">PLAYER 1</div>

      <div class="stack" id="stack-p1"></div>
      <div class="big-name empty" id="big-name-p1">SELECT</div>

      <div class="barcode">
        <div class="barcode-bars"></div>
        <div class="barcode-num">0 71486 03104 2</div>
      </div>
    </div>
  </div>

  <!-- The 3x3 character grid + cursors -->
  <div class="grid-wrapper">
    <div class="grid" id="grid"></div>
    <div class="cursor p1" id="cursor-p1"><div class="cursor-box"></div><div class="cursor-label">P1</div></div>
    <div class="cursor p2" id="cursor-p2"><div class="cursor-box"></div><div class="cursor-label">P2</div></div>
  </div>

  <!-- RIGHT preview panel: Player 2 -->
  <div class="preview p2" id="preview-p2">
    <div class="cover" id="cover-p2">
      <div class="cover-burst"></div>
      <div class="cover-characters empty" id="characters-p2"></div>
      <div class="cover-hover-badge">PREVIEW</div>
      <div class="cover-shade"></div>
      <div class="spine" id="spine-p2"></div>
      <div class="logo-block" id="logo-p2"></div>
      <div class="player-flag" id="flag-p2">PLAYER 2</div>

      <div class="stack" id="stack-p2"></div>
      <div class="big-name empty" id="big-name-p2">SELECT</div>

      <div class="barcode">
        <div class="barcode-bars"></div>
        <div class="barcode-num">0 71486 03104 2</div>
      </div>
    </div>
  </div>

  <div class="hero-select" id="heroSelect">HERO SELECT</div>
  <div class="hint" id="hint"></div>

  <!-- Background music. src is set from BGM_PATH in JS. -->
  <!-- BGM A: MvC3 select theme; plays during the 'selecting' phase -->
  <audio id="bgmSelect" loop preload="auto"></audio>
