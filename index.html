  <!-- BGM B: show music; takes over at the VS screen -->
  <audio id="bgmShow" preload="auto"></audio>
  <!-- Compatibility alias used by the older code paths -->
  <audio id="bgmAudio" loop preload="auto"></audio>
</div>

<!-- ============================================================ -->
<!-- VS SCREEN OVERLAY                                            -->
<!-- ============================================================ -->
<div class="vs-flash" id="vsFlash"></div>
<div class="vs-screen" id="vsScreen">
  <div class="starfield"></div>
  <div class="arc top"></div>
  <div class="arc bottom"></div>
  <svg class="sphere-grid" viewBox="-100 -100 200 200" preserveAspectRatio="xMidYMid meet" id="vsGrid"></svg>

  <!-- Confirm-transition layers: rays + bright central burst -->
  <div class="vs-rays"></div>
  <div class="vs-white-burst"></div>

  <div class="vs-side p1">
    <div class="vs-side-label" id="vsLabel-p1">PLAYER 1</div>
    <div class="vs-portraits" id="vs-portraits-p1"></div>

/* ==================================================================
   ============  PLACEHOLDER IMAGE GENERATOR (swap-friendly)  =======
   ================================================================== */
const PALETTE = [
  ['#ff5a3c','#7a1a00'], ['#3d9eff','#08305e'], ['#ffd23f','#7a5400'],
  ['#9b5cff','#3a1769'], ['#3cd6a1','#0c4a36'], ['#ff7ec1','#7a1a4d'],
  ['#5cd2ff','#0a3a5b'], ['#ff9a3c','#7a3a00'], ['#a3ff5c','#2e5a0d'],
];
function placeholderDataURI(name, idx) {
  const [c1, c2] = PALETTE[idx % PALETTE.length];
  const initials = name.split(/[\s-]/).map(w => w[0]).slice(0,2).join('');
  const svg =
    `<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'>` +
    `<defs><radialGradient id='g' cx='50%' cy='35%' r='75%'>` +
    `<stop offset='0%' stop-color='${c1}'/>` +
    `<stop offset='100%' stop-color='${c2}'/>` +
    `</radialGradient></defs>` +
    `<rect width='200' height='200' fill='url(#g)'/>` +
    `<circle cx='100' cy='78' r='34' fill='rgba(255,255,255,0.18)'/>` +
    `<rect x='52' y='128' width='96' height='62' rx='30' fill='rgba(255,255,255,0.18)'/>` +
    `<text x='100' y='115' text-anchor='middle' font-family='Impact,Arial,sans-serif' ` +
    `font-size='62' font-weight='900' fill='rgba(255,255,255,0.95)' ` +
    `stroke='rgba(0,0,0,0.55)' stroke-width='2'>${initials}</text>` +
    `</svg>`;
  return 'data:image/svg+xml;charset=utf-8,' + encodeURIComponent(svg);
}
function imageFor(char, idx) {
  return char.image || placeholderDataURI(char.name, idx);
}

/* ==================================================================
   ============  WARPED SPHERE GRID (SVG)  ===========================
   ================================================================== */
function buildSphereGrid(svg) {
  const meridians = 11;
  const parallels = 9;
  const R = 95;
  const strokeMain = "rgba(150,230,255,0.85)";
  const strokeOuter = "rgba(180,240,255,0.95)";
  let html =
    `<defs>
       <radialGradient id='ringGlow' cx='50%' cy='50%' r='50%'>
         <stop offset='0%' stop-color='rgba(120,200,255,0)'/>
         <stop offset='55%' stop-color='rgba(120,200,255,0.10)'/>
         <stop offset='100%' stop-color='rgba(120,200,255,0)'/>
       </radialGradient>
       <filter id='lineGlow' x='-30%' y='-30%' width='160%' height='160%'>
         <feGaussianBlur stdDeviation='0.45' result='b'/>
         <feMerge><feMergeNode in='b'/><feMergeNode in='SourceGraphic'/></feMerge>
       </filter>
       <linearGradient id='lineFadeV' x1='0' y1='-100' x2='0' y2='100' gradientUnits='userSpaceOnUse'>
         <stop offset='0%' stop-color='rgba(150,230,255,0.25)'/>
         <stop offset='50%' stop-color='rgba(150,230,255,1)'/>
         <stop offset='100%' stop-color='rgba(150,230,255,0.25)'/>
       </linearGradient>
       <mask id='vFade'>
         <rect x='-100' y='-100' width='200' height='200' fill='url(#lineFadeV)'/>
       </mask>
     </defs>
     <g filter='url(#lineGlow)' mask='url(#vFade)'>
     <circle cx='0' cy='0' r='${R}' fill='url(#ringGlow)'
       stroke='${strokeOuter}' stroke-width='0.5'/>`;
  for (let i = 1; i < meridians; i++) {
    const t = i / meridians;
    const angle = t * Math.PI;
    const rx = Math.abs(R * Math.sin(angle));
    html += `<ellipse cx='0' cy='0' rx='${rx.toFixed(2)}' ry='${R}'
              fill='none' stroke='${strokeMain}' stroke-width='0.4'/>`;
  }
  for (let i = 1; i < parallels; i++) {
    const t = i / parallels;
    const angle = t * Math.PI;
    const y = -R * Math.cos(angle);
    const chord = R * Math.sin(angle);
    html += `<ellipse cx='0' cy='${y.toFixed(2)}' rx='${chord.toFixed(2)}'
              ry='${(chord*0.18).toFixed(2)}'
              fill='none' stroke='${strokeMain}' stroke-width='0.4'/>`;
  }
  html += `</g>`;
  svg.innerHTML = html;
}
buildSphereGrid(document.getElementById('sphereGrid'));
buildSphereGrid(document.getElementById('vsGrid'));

}

/* ==================================================================
   ============  BUILD GRID  =========================================
   ================================================================== */
const gridEl = document.getElementById('grid');
CHARACTERS.forEach((char, idx) => {

/* ==================================================================
   ============  STATE  ==============================================
   ================================================================== */
const state = {
  p1: { row: 0, col: 0, selections: [], done: false },
  p2: { row: GRID_ROWS - 1, col: GRID_COLS - 1, selections: [], done: false },
};

function buildStacks() {
  ['p1','p2'].forEach(p => {
    const stack = document.getElementById(`stack-${p}`);
    stack.innerHTML = '';
    for (let i = 0; i < SELECTIONS_PER_PLAYER; i++) {

      s.className = 'slot-pick';
      stack.appendChild(s);
    }
  });
}
buildStacks();

/* ==================================================================
   ============  CURSOR POSITIONING (transform-based, smooth)  =======
   ================================================================== */
// Cache slot offsets so we don't getBoundingClientRect() on every keypress.
let slotOffsets = []; // array of {x, y}
function recomputeSlotOffsets() {
  slotOffsets = [];
  const wrapper = gridEl.getBoundingClientRect();
  for (const slot of gridEl.children) {
    const r = slot.getBoundingClientRect();
    slotOffsets.push({
      x: r.left - wrapper.left + gridEl.offsetLeft,
      y: r.top  - wrapper.top  + gridEl.offsetTop,
      w: r.width, h: r.height,
    });
  }
}
function updateCursor(player) {
  const s = state[player];
  const idx = s.row * GRID_COLS + s.col;
  const off = slotOffsets[idx];
  if (!off) return;
  const cursor = document.getElementById(`cursor-${player}`);
  cursor.style.width  = off.w + 'px';
  cursor.style.height = off.h + 'px';
  cursor.style.transform = `translate3d(${off.x}px, ${off.y}px, 0)`;
}
function updateCursors() {
  updateCursor('p1');
  updateCursor('p2');
}

function updateLocks() {
  [...gridEl.children].forEach(el => el.classList.remove('locked-p1','locked-p2'));
  state.p1.selections.forEach(i => gridEl.children[i].classList.add('locked-p1'));
  state.p2.selections.forEach(i => gridEl.children[i].classList.add('locked-p2'));
}

function updatePreview(player) {
  const stack   = document.getElementById(`stack-${player}`);
  const chars   = document.getElementById(`characters-${player}`);
  const cover   = document.getElementById(`cover-${player}`);
  const bigName = document.getElementById(`big-name-${player}`);
  const s       = state[player];
  const sel     = s.selections;

  // Mini team thumbnails (unchanged)
  [...stack.children].forEach((tile, i) => {
    if (i < sel.length) {
      const c = CHARACTERS[sel[i]];
      tile.classList.add('filled');
      tile.innerHTML = `
        <img src="${imageFor(c, sel[i])}" alt="${c.name}"/>
        <div class="pick-name">${c.name}</div>
      `;
    } else {
      tile.classList.remove('filled');
      tile.innerHTML = '';
    }
  });

  // ---- Hover slot: should we render a translucent "next pick" preview? ----
  // (Only while still selecting and the cursor is on an unconfirmed cell.)
  let hoverCharIdx = null;
  if (phase === 'selecting' && !s.done) {
    const cursorIdx = s.row * GRID_COLS + s.col;
    if (!sel.includes(cursorIdx) && CHARACTERS[cursorIdx]) {
      hoverCharIdx = cursorIdx;
    }
  }

  // ---- Reconcile confirmed picks (append-only, preserves entrance anim) ----
  const confirmedEls = [...chars.querySelectorAll('.cover-char:not(.hover)')];
  const existingKeys = confirmedEls.map(el => el.dataset.key);
  const desiredKeys  = sel.map((idx, pos) => `c-${idx}@${pos}`);
  const isPrefix = desiredKeys.slice(0, existingKeys.length)
                              .every((k, i) => k === existingKeys[i]);
  if (!isPrefix || desiredKeys.length < existingKeys.length) {
    confirmedEls.forEach(el => el.remove());
    existingKeys.length = 0;
  }
  for (let i = existingKeys.length; i < sel.length; i++) {
    const charIdx = sel[i];
    const c = CHARACTERS[charIdx];
    const el = document.createElement('div');
    el.className = 'cover-char';
    el.dataset.key = `c-${charIdx}@${i}`;
    el.style.backgroundImage = `url("${imageFor(c, charIdx)}")`;
    chars.appendChild(el);
  }

  // ---- Reconcile hover slot (always the last child when present) ----
  let hoverEl = chars.querySelector('.cover-char.hover');
  if (hoverCharIdx === null) {
    if (hoverEl) hoverEl.remove();
    hoverEl = null;
  } else {
    const c = CHARACTERS[hoverCharIdx];
    const url = `url("${imageFor(c, hoverCharIdx)}")`;
    if (!hoverEl) {
      hoverEl = document.createElement('div');
      hoverEl.className = 'cover-char hover';
      hoverEl.style.backgroundImage = url;
      chars.appendChild(hoverEl);
    } else {
      // Make sure it stays the last child (newest in stacking order)
      if (chars.lastElementChild !== hoverEl) chars.appendChild(hoverEl);
      if (hoverEl.style.backgroundImage !== url) hoverEl.style.backgroundImage = url;
    }
    hoverEl.dataset.charIdx = String(hoverCharIdx);
  }

  // ---- Recompute count & recency across ALL children (confirmed + hover) ----
  const kids = [...chars.children];
  const total = kids.length;
  kids.forEach((el, i) => { el.dataset.recency = String(total - 1 - i); });
  chars.dataset.count = String(total);

  // ---- Big name + cover state classes ----
  if (total > 0) {
    chars.classList.remove('empty');
    cover.classList.add('has-feature');
    // Latest visible character = hover if present, else most recent confirmed
    const featuredIdx = hoverCharIdx !== null ? hoverCharIdx : sel[sel.length - 1];
    setBigName(bigName, CHARACTERS[featuredIdx].name);
    bigName.classList.remove('empty');
  } else {
    chars.classList.add('empty');
    cover.classList.remove('has-feature');
    setBigName(bigName, 'SELECT');
    bigName.classList.add('empty');
  }

  // Toggle the cover-level "preview-hover" state class — drives the
  // PREVIEW badge visibility and the italic dim styling on .big-name
  cover.classList.toggle('preview-hover', hoverCharIdx !== null);
}

// Hover updates re-run the same renderer (they only differ from a real
// confirm in that they don't push to selections). Kept as a separate
// name so the call sites still read clearly.
function updateHoverPreview(player) { updatePreview(player); }

// Set the big character name and auto-shrink its font so a long name
// (e.g. WOLVERINE) doesn't overflow the available width.
function setBigName(el, text) {
  el.textContent = text;
  el.style.fontSize = '';  // reset to the CSS clamp() max
  requestAnimationFrame(() => {
    let size = parseFloat(getComputedStyle(el).fontSize) || 60;
    let guard = 30;
    while (el.scrollWidth > el.clientWidth + 1 && size > 14 && guard-- > 0) {
      size -= 2;
      el.style.fontSize = size + 'px';
    }
  });
}

/* ==================================================================
   ============  AUDIO  ==============================================
   ================================================================== */
let audioCtx = null;
let masterGain = null;
let bgmGain = null;
let sfxGain = null;
let bgmStarted = false;
let bgmTimer = null;
let muted = false;

function audio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    masterGain = audioCtx.createGain();
    masterGain.gain.value = 1.0;
    masterGain.connect(audioCtx.destination);

    bgmGain = audioCtx.createGain();
    bgmGain.gain.value = BGM_VOLUME;
    bgmGain.connect(masterGain);

    sfxGain = audioCtx.createGain();
    sfxGain.gain.value = 0.8;
    sfxGain.connect(masterGain);
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
  return audioCtx;
}

// ---- Sound effects --------------------------------------------------
// Synth SFX disabled — they sounded tacky for a live show. Background
// music (bgmAudio mp3) is unaffected and still routes through bgmGain.
function sfx() {}
function playCursorMove() {}
function playConfirm() {}
function playReject() {}
function playVSImpact() {}

/* ----  BACKGROUND MUSIC (two tracks: select + show) --------------- */
// Two <audio> elements so the select theme can stay looping during
// character pick, then we swap to the show track when VS triggers.
const bgmSelect = document.getElementById('bgmSelect');
const bgmShow   = document.getElementById('bgmShow');
const bgmAudio  = document.getElementById('bgmAudio'); // back-compat alias
bgmSelect.src = encodeURI(SELECT_BGM_PATH);
bgmShow.src   = encodeURI(SHOW_BGM_PATH);
bgmSelect.volume = BGM_VOLUME;
bgmShow.volume   = BGM_VOLUME;
bgmSelect.loop = true;
bgmShow.loop   = false;       // show track plays once through; we drive it
// Keep the legacy element silent — we don't use it for playback anymore
bgmAudio.src = encodeURI(SHOW_BGM_PATH);
bgmAudio.muted = true;

// Whichever track is currently the "active" one for the runner to watch
function activeBgm() { return phase === 'selecting' ? bgmSelect : bgmShow; }

function startBGM() {
  if (bgmStarted) return;
  bgmStarted = true;
  // Start whichever track matches the current phase
  const a = activeBgm();
  const p = a.play();
  if (p && typeof p.catch === 'function') {
    p.catch(err => {
      console.warn('BGM autoplay blocked or file missing:', err);
      bgmStarted = false;
    });
  }
}
function stopBGM() {
  bgmStarted = false;
  bgmSelect.pause();
  bgmShow.pause();
}

function setMuted(m) {
  muted = m;
  if (masterGain && audioCtx) {
    masterGain.gain.setTargetAtTime(m ? 0 : 1, audioCtx.currentTime, 0.02);
  }
  bgmSelect.muted = m;
  bgmShow.muted   = m;
}

// Phase-driven music swap. Called when phase changes between
// 'selecting' / 'vs' / 'fighting'. The VS screen onward plays the
// show track starting at SHOW_BGM_START_TIME.
function swapMusicForPhase(newPhase) {
  if (newPhase === 'selecting') {
    bgmShow.pause();
    bgmSelect.currentTime = bgmSelect.currentTime || 0;
    bgmSelect.play().catch(() => {});
  } else if (newPhase === 'vs' || newPhase === 'fighting') {
    // Only swap on the FIRST transition out of selecting (avoid restart
    // when going vs -> fighting if show track is already running)
    if (bgmShow.paused) {
      bgmSelect.pause();
      bgmShow.currentTime = SHOW_BGM_START_TIME;
      bgmShow.play().catch(err => console.warn('show bgm:', err));
    }
  }
}

/* ==================================================================
   ============  MOVE / CONFIRM / RESET  =============================
   ================================================================== */
function move(player, dr, dc) {
  const s = state[player];
  if (s.done) return;
  const nr = Math.max(0, Math.min(GRID_ROWS - 1, s.row + dr));
  const nc = Math.max(0, Math.min(GRID_COLS - 1, s.col + dc));
  if (nr === s.row && nc === s.col) return;
  s.row = nr; s.col = nc;
  playCursorMove();
  updateCursor(player);
  updateHoverPreview(player);
}

function confirm(player) {
  const s = state[player];
  if (s.done) return;
  const idx = s.row * GRID_COLS + s.col;
  if (s.selections.includes(idx)) { playReject(); return; }
  s.selections.push(idx);
  playConfirm();
  updatePreview(player);
  updateLocks();
  if (s.selections.length >= SELECTIONS_PER_PLAYER) s.done = true;
  updateHoverPreview(player);
  // (No challenger screen on selection — that fires on fight swap-ins instead.)
  // Both players done -> wait for global Enter to advance into VS screen
}

/* Apply a deferred teammate swap (queued by handleKO) for whichever side's
   incoming fighter matches charIdx, refilling their health bar. Called from
   showChallenger so the bar only updates once the foe has actually arrived. */
function applyPendingSwap(charIdx) {
  ['p1', 'p2'].forEach(side => {
    const f = fight[side];
    if (!f || !f.pendingSwap) return;
    const nextIdx = state[side].selections[f.activeIdx + 1];
    if (nextIdx === charIdx) {
      f.activeIdx += 1;
      f.hp = MAX_HP;
      f.pendingSwap = false;
      renderFightHUD(side);
    }
  });
}

/* Full-screen "Challenger Approaching" takeover (2.5s) with the entering
   character's face composited over the white burst. Works for any
   character — shows their photo if set, else the placeholder. */
function showChallenger(charIdx) {
  const c = CHARACTERS[charIdx];
  if (!c) return;
  const screen = document.getElementById('challenger');
  const vid    = document.getElementById('challengerVid');
  const face   = document.getElementById('challengerFace');
  face.style.backgroundImage = `url("${imageFor(c, charIdx)}")`;
  screen.classList.remove('show'); void screen.offsetWidth;
  screen.classList.add('show');
  // The foe has arrived: now apply any deferred teammate swap so the new
  // fighter's full health bar appears with the reveal (and not before it).
  applyPendingSwap(charIdx);
  try {
    // Unmuted — the template's "challenger" jingle plays over the show song.
    vid.muted = false;
    vid.currentTime = 0;
    const p = vid.play();
    if (p && p.catch) p.catch(() => {});
  } catch (e) {}
  clearTimeout(showChallenger._t);
  showChallenger._t = setTimeout(() => {
    screen.classList.remove('show');
    vid.pause();
  }, 2500);
}


// Phase machine: 'selecting' -> 'vs' -> 'fighting'
let phase = 'selecting';
function bothPlayersReady() { return state.p1.done && state.p2.done; }

function reset() {
  phase = 'selecting';
  state.p1 = { row: 0, col: 0, selections: [], done: false };
  state.p2 = { row: GRID_ROWS - 1, col: GRID_COLS - 1, selections: [], done: false };
  buildStacks();
  updatePreview('p1');
  updatePreview('p2');
  updateLocks();
  document.getElementById('vsScreen').classList.remove('visible');
  document.getElementById('fightScreen').classList.remove('visible');
  document.getElementById('fightKO').classList.remove('show');
  document.getElementById('vs-portraits-p1').innerHTML = '';
  document.getElementById('vs-portraits-p2').innerHTML = '';
  // Clear the ulti video overlay in case it was showing
  const uv = document.getElementById('ultiVideo');
  if (uv) { uv.pause(); uv.classList.remove('show'); uv.currentTime = 0; }
  // Clear the challenger screen
  clearTimeout(showChallenger._t);
  const ch = document.getElementById('challenger');
  if (ch) { ch.classList.remove('show'); const cv = document.getElementById('challengerVid'); if (cv) cv.pause(); }
  // Recompute layout (VS screen may have interfered) and snap cursors instantly
  // so the visual position matches the freshly reset state.
  recomputeSlotOffsets();
  ['p1','p2'].forEach(player => {
    const cursor = document.getElementById(`cursor-${player}`);
    const prev = cursor.style.transition;
    cursor.style.transition = 'none';
    updateCursor(player);
    // force reflow, then restore transition
    void cursor.offsetWidth;
    cursor.style.transition = prev;
    updateHoverPreview(player);
  });
}

   ============  VS SCREEN  ==========================================

function triggerVS() {

                      <div class="pname">${c.name}</div>`;

/* ==================================================================
   ============  FIGHT SCREEN  =======================================
   ==================================================================
   Operator controls (during phase === 'fighting'):
     A          - damage P1   (random ~8-16%)
     D          - heal P1     (~5%, in case you over-tap)
     Q          - P1 medium attack FX
     E          - P1 super move FX
     LeftArrow  - damage P2
     RightArrow - heal P2
     [          - P2 medium attack FX
     ]          - P2 super move FX
================================================================== */

const MAX_HP = 100;
const DAMAGE_MIN = 8;
const DAMAGE_MAX = 16;
const HEAL_AMT = 5;

const fight = {
  p1: { team: [], activeIdx: 0, hp: MAX_HP, defeated: false },
  p2: { team: [], activeIdx: 0, hp: MAX_HP, defeated: false },
};

function startFight() {
  // Build team rosters from the picks each player made during selection
  ['p1','p2'].forEach(p => {
    fight[p] = {
      team: state[p].selections.map(i => CHARACTERS[i]),
      activeIdx: 0,
      hp: MAX_HP,
      defeated: false,
    };
  });

  // Hide VS, show fight screen
  document.getElementById('vsScreen').classList.remove('visible');
  const fs = document.getElementById('fightScreen');
  fs.classList.remove('visible'); void fs.offsetWidth;
  fs.classList.add('visible');

  // Hide any leftover KO banner
  const ko = document.getElementById('fightKO');
  ko.classList.remove('show');
  ko.textContent = '';

  renderFightHUD('p1');
  renderFightHUD('p2');
}

function renderFightHUD(player) {
  const f = fight[player];
  const portrait = document.getElementById(`fightPortrait-${player}`);
  const fill     = document.getElementById(`hpFill-${player}`);
  const name     = document.getElementById(`fightName-${player}`);
  const reserve  = document.getElementById(`reserve-${player}`);

  // Active character (or last KO'd if team wiped)
  const activeChar = f.team[Math.min(f.activeIdx, f.team.length - 1)];
  if (activeChar) {
    portrait.innerHTML = `<img src="${activeChar.image || placeholderDataURI(activeChar.name, 0)}" alt="${activeChar.name}"/>`;
    name.textContent = activeChar.name;
  }

  const pct = Math.max(0, Math.min(100, f.hp));
  fill.style.width = pct + '%';
  fill.classList.toggle('low', pct > 0 && pct <= 30);
  fill.classList.toggle('empty', pct <= 0);

  // Reserve pills = team members NOT currently active
  reserve.innerHTML = '';
  f.team.forEach((c, i) => {
    if (i === f.activeIdx && !f.defeated) return;  // skip current
    const pill = document.createElement('div');
    pill.className = 'reserve-pill' + (i < f.activeIdx || (f.defeated && i === f.activeIdx) ? ' ko' : '');
    pill.innerHTML = `<span>${c.name}</span>`;
    reserve.appendChild(pill);
  });
}

function damagePlayer(player) {
  const f = fight[player];
  if (f.defeated) return;
  const dmg = DAMAGE_MIN + Math.floor(Math.random() * (DAMAGE_MAX - DAMAGE_MIN + 1));
  f.hp = Math.max(0, f.hp - dmg);
  // small hit feedback
  hitShake();
  sfx(180, 0.06, { type: 'square', gain: 0.12, slideTo: 110 });

  if (f.hp <= 0) {
    handleKO(player);
  }
  renderFightHUD(player);
}

function healPlayer(player) {
  const f = fight[player];
  if (f.defeated) return;
  if (f.hp >= MAX_HP) { playReject(); return; }
  f.hp = Math.min(MAX_HP, f.hp + HEAL_AMT);
  sfx(660, 0.07, { type: 'sine', gain: 0.10, slideTo: 880 });
  renderFightHUD(player);
}

function handleKO(player) {
  const f = fight[player];
  // Try to swap to next teammate
  if (f.activeIdx < f.team.length - 1) {
    // Drop a red "K.O.!" so the audience reads the kill, then mark a
    // PENDING swap. The incoming fighter and their full health bar are
    // NOT shown yet — that happens only when the matching `challenger`
    // ("A NEW FOE APPEARED") cue fires at its hardcoded time. Until then
    // the downed fighter's emptied bar stays on screen.
    showFXText('K.O.!', false, false, 'ko');
    hitShake();
    f.pendingSwap = true;
  } else {
    f.defeated = true;
    f.hp = 0;
    // Whole team down: show big KO banner
    showKO(player === 'p1' ? 'p2' : 'p1');
  }
}

function hitShake() {
  const fs = document.getElementById('fightScreen');
  fs.classList.remove('shake'); void fs.offsetWidth; fs.classList.add('shake');
}

/* --------------------------------------------------------------------
   MOVE TABLES — each character has their own medium move name and a
   unique super-move name + visual TYPE. The type selects which
   animation set fires:
     beam   — horizontal energy beam crosses the screen
     quake  — shockwave rises from the ground + light pillars
     slash  — diagonal blade-marks rip across the screen
     plasma — large orb grows out, then exploding rings
     rush   — rapid sequence of impact bursts (combo flurry)
   Move names here are deliberately generic so they're not specific
   to any one fighting game — they describe the visual, not a
   trademarked technique.
-------------------------------------------------------------------- */
const SUPER_MOVES = {
  AARON:    { name: 'AARON BREAK!',   type: 'beam'   },
  JWONG:    { name: 'JWONG STORM!',   type: 'plasma' },
  ANDREW:   { name: 'ANDREW BLAZE!',  type: 'slash'  },
  MATT:     { name: 'MATT CRUSH!',    type: 'quake'  },
  'KENG I': { name: 'KENG SPECIAL!',  type: 'plasma' },
  MARKUS:   { name: 'MARKUS BLAST!',  type: 'beam'   },
  'KIAN HWEE': { name: 'KIAN FURY!',  type: 'rush'   },
  BRAYDON:  { name: 'BRAYDON SLAM!',  type: 'quake'  },
  JOEL:     { name: 'POWER SURGE!',   type: 'rush'   },
};
const MEDIUM_MOVES = {
  AARON:    'POWER PUNCH!',
  JWONG:    'JWONG SHOT!',
  ANDREW:   'STRIKE!',
  MATT:     'MATT SLAM!',
  'KENG I': 'KENG SHOT!',
  MARKUS:   'WEAPON SHOT!',
  'KIAN HWEE': 'KIAN HIT!',
  BRAYDON:  'BRAYDON BASH!',
  JOEL:     'POWER STRIKE!',
};

const MEDIUM_DAMAGE_MIN = 12;
const MEDIUM_DAMAGE_MAX = 20;
const SUPER_DAMAGE_MIN  = 30;
const SUPER_DAMAGE_MAX  = 45;

function activeChar(player) {
  const f = fight[player];
  return f.team[Math.min(f.activeIdx, f.team.length - 1)];
}
function opponent(player) { return player === 'p1' ? 'p2' : 'p1'; }

/* --------------------------------------------------------------------
   playMediumFX(player)  - Projectile attack (slow energy projectile)
   - Spawns offscreen behind the player and travels across screen
   - Emits trailing sparks as it flies
   - On impact, deals 12-20 damage to opponent and shows medium FX text
-------------------------------------------------------------------- */
/* Visual half only: kicks off the projectile animation + sparkle trail.
   Used by the choreography runner when we want the impact pinned to a
   precise song time (separate `fire-impact` cue handles the impact). */
function playMediumFXVisual(player) {
  const proj = document.getElementById('projectile');
  const cool = (player === 'p2');
  const ac = activeChar(player);
  const moveName = (ac && MEDIUM_MOVES[ac.name]) || 'POWER SHOT!';

  proj.className = 'projectile' + (cool ? ' cool' : '');
  void proj.offsetWidth;
  proj.classList.add(player === 'p1' ? 'fire-p1' : 'fire-p2');

  // (move-name callout text removed per request)

  // Trailing sparks during the 1.5s flight
  let tStart = performance.now();
  const trail = setInterval(() => {
    const elapsed = performance.now() - tStart;
    const pct = elapsed / 1450;
    if (pct >= 1) { clearInterval(trail); return; }
    const x = player === 'p1' ? (-40 + pct * 150) : (110 - pct * 150);
    spawnTrailBurst(x, 48, cool, 3);
  }, 90);
}

/* Impact half only: bright burst + damage application. */
function playMediumFXImpact(player, opts = {}) {
  const impact = document.getElementById('impactBurst');
  const cool = (player === 'p2');
  const opp = opponent(player);

  impact.className = 'impact-burst' + (cool ? ' cool' : '');
  impact.style.left = (player === 'p1' ? '76vw' : '8vw');
  void impact.offsetWidth;
  impact.classList.add('go');

  // Big anime fire explosion at the impact point (opponent's side)
  playFxVideo('fireImpact', { left: (player === 'p1' ? '78vw' : '22vw'), top: '50%' });
  // Large shockwave at the impact for grandeur
  playFxVideo('shockCool', { left: (player === 'p1' ? '78vw' : '22vw'), top: '50%', width: '90vw' });
  hitShake();

  if (!fight[opp].defeated) {
    const dmg = (opts.amount != null)
      ? opts.amount
      : MEDIUM_DAMAGE_MIN + Math.floor(Math.random() * (MEDIUM_DAMAGE_MAX - MEDIUM_DAMAGE_MIN + 1));
    fight[opp].hp = Math.max(0, fight[opp].hp - dmg);
    spawnSparks(opp, cool, 22, 8);
    if (fight[opp].hp <= 0) handleKO(opp);
    renderFightHUD(opp);
  }
}

/* Unified call (used by the manual Q / [ keys and the old 'fireball' cue).
   Visual now, impact 1.28s later via setTimeout. Adequate for one-off
   manual presses; the choreography runner uses the split version for
   tight song-locked timing. */
function playMediumFX(player, opts = {}) {
  playMediumFXVisual(player);
  setTimeout(() => playMediumFXImpact(player, opts), 1280);
}

/* --------------------------------------------------------------------
   playSuperFX(player)  - Character-specific Hyper move
   Routes to one of five animation types based on the active
   character's moveset. Damages opponent for 30-45 hp.
-------------------------------------------------------------------- */
function playSuperFX(player) {
  const cool  = (player === 'p2');
  const opp   = opponent(player);
  const ac    = activeChar(player);
  const move  = (ac && SUPER_MOVES[ac.name]) || { name: 'POWER SURGE!', type: 'beam' };

  const dim   = document.getElementById('fightDim');
  const flash = document.getElementById('fightFlash');
  const streak = document.getElementById('fxStreak');
  const counter = document.getElementById('hitCounter');
  const hitNum  = document.getElementById('hitNum');

  // Big white flash + darken background (cinematic zoom-in feel)
  flash.classList.remove('medium','super'); void flash.offsetWidth;
  flash.classList.add('super');
  dim.classList.add('on');
  setTimeout(() => dim.classList.remove('on'), 1900);

  // Diagonal light streak sweep
  streak.classList.remove('go'); void streak.offsetWidth;
  streak.classList.add('go');

  // Route to the move's visual type
  switch (move.type) {
    case 'beam':   playSuperBeam(player, cool);   break;
    case 'quake':  playSuperQuake(player, cool);  break;
    case 'slash':  playSuperSlash(player, cool);  break;
    case 'plasma': playSuperPlasma(player, cool); break;
    case 'rush':   playSuperRush(player, cool);   break;
    default:       playSuperBeam(player, cool);
  }

  // Heavy spark burst from the player's side
  spawnSparks(player, cool, 50, 14);
  // Big central shockwave on the player's side
  playFxVideo('shockCool', { left: (player === 'p1' ? '34vw' : '66vw'), top: '48%', width: '100vw' });

  // (move-name text + hit counter removed per request)

  // Damage opponent
  if (!fight[opp].defeated) {
    const dmg = SUPER_DAMAGE_MIN + Math.floor(Math.random() * (SUPER_DAMAGE_MAX - SUPER_DAMAGE_MIN + 1));
    // Apply damage halfway through the animation so the bar visibly drains during the fx
    setTimeout(() => {
      if (fight[opp].defeated) return;
      fight[opp].hp = Math.max(0, fight[opp].hp - dmg);
      if (fight[opp].hp <= 0) handleKO(opp);
      renderFightHUD(opp);
    }, 700);
  }

  playVSImpact();
  hitShake();
}

/* Spawn a fan of sparks of various sizes/durations flying outward */
function spawnSparks(player, cool, count = 28, streakCount = 8) {
  const field = document.getElementById('sparkField');
  const originX = player === 'p1' ? 14 : 86;
  for (let i = 0; i < count; i++) {
    const s = document.createElement('div');
    s.className = 'spark' + (cool ? ' cool' : '');
    const sz = 3 + Math.random() * 9;
    s.style.width = sz + 'px';
    s.style.height = sz + 'px';
    s.style.left = (originX + (Math.random() - 0.5) * 8) + '%';
    s.style.top  = (45 + (Math.random() - 0.5) * 40) + '%';
    const ang  = (Math.random() * Math.PI) - Math.PI / 2;
    const sign = player === 'p1' ? 1 : -1;
    const dist = 100 + Math.random() * 260;
    s.style.setProperty('--dx', (sign * Math.cos(ang) * dist).toFixed(1) + 'px');
    s.style.setProperty('--dy', (Math.sin(ang) * dist).toFixed(1) + 'px');
    s.style.setProperty('--dur', (700 + Math.random() * 700) + 'ms');
    s.style.animationDelay = (Math.random() * 300) + 'ms';
    field.appendChild(s);
    requestAnimationFrame(() => s.classList.add('go'));
  }
  // Long motion-blur streak sparks
  for (let i = 0; i < streakCount; i++) {
    const s = document.createElement('div');
    s.className = 'spark-streak' + (cool ? ' cool' : '');
    s.style.width = (60 + Math.random() * 90) + 'px';
    s.style.left = (originX + (Math.random() - 0.5) * 6) + '%';
    s.style.top  = (45 + (Math.random() - 0.5) * 35) + '%';
    const angDeg = (Math.random() * 70) - 35 + (player === 'p1' ? 0 : 180);
    s.style.setProperty('--ang', angDeg + 'deg');
    const sign = player === 'p1' ? 1 : -1;
    const dist = 180 + Math.random() * 200;
    s.style.setProperty('--dx', (sign * Math.cos(angDeg * Math.PI / 180) * dist).toFixed(1) + 'px');
    s.style.setProperty('--dy', (Math.sin(angDeg * Math.PI / 180) * dist).toFixed(1) + 'px');
    s.style.setProperty('--dur', (600 + Math.random() * 500) + 'ms');
    s.style.animationDelay = (Math.random() * 250) + 'ms';
    field.appendChild(s);
    requestAnimationFrame(() => s.classList.add('go'));
  }
  // Twinkles that linger
  for (let i = 0; i < Math.min(count / 2 | 0, 18); i++) {
    const t = document.createElement('div');
    t.className = 'twinkle' + (cool ? ' cool' : '');
    t.style.left = (10 + Math.random() * 80) + '%';
    t.style.top  = (20 + Math.random() * 60) + '%';
    t.style.animationDelay = (Math.random() * 600) + 'ms';
    field.appendChild(t);
    requestAnimationFrame(() => t.classList.add('go'));
  }
  setTimeout(() => {
    [...field.children].forEach(c => {
      if (!c.classList.contains('go')) return;
      // Remove old elements gradually so we don't bloat the DOM
      c.remove();
    });
  }, 2400);
}

/* ==================================================================
   ============  CHOREOGRAPHY RUNNER  ================================
   ==================================================================
   Two cue lists:
     SELECT_CUES — timed from when P was pressed (wall-clock seconds),
                   fires only while phase === 'selecting'.
     SHOW_CUES   — timed against bgmShow.currentTime (show-track seconds),
                   fires from VS screen onward.
================================================================== */
let showRunning      = false;
let tickActive       = false; // guards against spawning duplicate tick loops
let showStartedAt    = 0;     // performance.now() when P was pressed
let lastSelectCueIdx = -1;
let lastShowCueIdx   = -1;

const ultiVideo = document.getElementById('ultiVideo');
ultiVideo.src = encodeURI(ULT_VIDEO_PATH);

/* --- per-cue helpers --- */
function gotoCursor(player, row, col) {
  const s = state[player];
  if (s.done || phase !== 'selecting') return;
  s.row = Math.max(0, Math.min(GRID_ROWS - 1, row));
  s.col = Math.max(0, Math.min(GRID_COLS - 1, col));
  updateCursor(player);
  updateHoverPreview(player);
}

function applyExactDamage(player, amount) {
  const f = fight[player];
  if (!f || f.defeated) return;
  f.hp = Math.max(0, f.hp - amount);
  hitEffect(player);                 // burst + comic word + sparks on the struck side
  if (f.hp <= 0) handleKO(player);
  renderFightHUD(player);
}

/* Play one of the alpha-webm FX clips. Resets to frame 0 each call so it
   retriggers cleanly for rapid hits. Position/size via opts (left/top/width
   in CSS units). If the file is missing, play() rejects and we hide it —
   the CSS bursts underneath still carry the moment. */
function playFxVideo(id, opts = {}) {
  const el = document.getElementById(id);
  if (!el) return;
  if (opts.left  != null) el.style.left  = opts.left;
  if (opts.top   != null) el.style.top   = opts.top;
  if (opts.width != null) el.style.width = opts.width;
  try {
    el.currentTime = 0;
    el.classList.add('playing');
    const p = el.play();
    if (p && p.catch) p.catch(() => el.classList.remove('playing'));
  } catch (e) { el.classList.remove('playing'); }
  el.onended = () => el.classList.remove('playing');
}

/* Punch hit FX — fires on every damage tick. The struck fighter's side
   of the screen (P1 = left, P2 = right) gets an anime burst video, a few
   sparks and a comic "POW!"-style word. Lightweight so the rapid 0.7s
   combo can retrigger it instantly. */
const HIT_WORDS = ['POW!', 'BAM!', 'WHAM!', 'CRACK!', 'BIFF!', 'SMACK!', 'BOOM!'];
function hitEffect(struck) {
  const cool = (struck === 'p2');
  // Jittered position on the struck fighter's half of the screen
  const baseX = struck === 'p1' ? 30 : 70;
  const x = baseX + (Math.random() - 0.5) * 12;   // vw
  const y = 52 + (Math.random() - 0.5) * 16;       // %

  // Anime burst video on the struck side (warm for P1, cool/cyan for P2)
  playFxVideo(cool ? 'hitCool' : 'hitWarm', { left: x + 'vw', top: y + '%' });
  // Expanding shockwave (white flash + energy burst) so each punch reads big
  playFxVideo('shockCool', { left: x + 'vw', top: y + '%', width: '50vw' });

  // CSS burst underneath (instant flash + fallback if the webm is missing)
  const burst = document.createElement('div');
  burst.className = 'hit-burst' + (cool ? ' cool' : '');
  burst.style.left = x + 'vw';
  burst.style.top  = y + '%';
  document.body.appendChild(burst);
  requestAnimationFrame(() => burst.classList.add('go'));
  setTimeout(() => burst.remove(), 520);

  // (comic "POW!" word removed per request)

  // A few sparks + the screen shake
  spawnSparks(struck, cool, 12, 4);
  hitShake();
}

function simulateEnter() {
  if (phase === 'selecting') {
    if (bothPlayersReady()) {
      phase = 'vs';
      swapMusicForPhase('vs');   // <-- music swaps to show track here
      triggerVS();
    } else {
      confirm('p1');
    }
  } else if (phase === 'vs') {
    phase = 'fighting';
    startFight();
  }
}

// Big center "3 / 2 / 1 / GO" round-start text. Re-triggers its pop
// animation on every call by toggling the .tick class with a reflow.
function showCountdown(text) {
  const el = document.getElementById('fightCount');
  if (!el) return;
  el.textContent = text;
  el.classList.toggle('go', String(text).toUpperCase() === 'GO');
  el.classList.remove('tick'); void el.offsetWidth; el.classList.add('tick');
}

function spliceShowTrack(toSeconds) {
  if (!bgmShow) return;
  bgmShow.currentTime = Math.max(0, toSeconds);
  // Reset lastShowCueIdx so cues after the splice target can still fire
  // (lastShowCueIdx is already monotonic relative to cue array, but the
  // array is sorted by t — if a cue has t < toSeconds but hasn't fired,
  // we mark it as already-handled so the runner doesn't re-fire stale ones)
  for (let i = lastShowCueIdx + 1; i < SHOW_CUES.length; i++) {
    if (SHOW_CUES[i].t > toSeconds) break;
    lastShowCueIdx = i;
  }
}

function playUltiVideo(side = 'p1', kill = false) {
  if (phase !== 'fighting') {
    phase = 'fighting';
    startFight();
  }
  const v = document.getElementById('ultiVideo');
  v.muted = false;
  v.currentTime = 0;
  v.classList.add('show');
  const playP = v.play();
  if (playP && playP.catch) playP.catch(err => console.warn('ulti video play failed:', err));
  // (ULTIMATE! callout text removed per request)
  hitShake();

  // The lethal blow lands AFTER the cinematic finishes: when the ulti
  // video ends we hide it, drain the loser's bar to 0, then a short beat
  // later pop the K.O. + "<lead> WINS!" banner — all on the fight screen,
  // not hidden behind the full-screen video.
  const opp = side === 'p1' ? 'p2' : 'p1';
  v.onended = () => {
    v.classList.remove('show');
    if (!kill || !fight[opp] || fight[opp].defeated) return;
    fight[opp].hp = 0;
    renderFightHUD(opp);                    // bar visibly drains to empty
    setTimeout(() => handleKO(opp), 600);   // then K.O. -> "AARON WINS!"
  };
}

function runCue(cue) {
  switch (cue.do) {
    case 'cursor':      gotoCursor(cue.side, cue.row, cue.col); break;
    case 'pick':        confirm(cue.side); break;
    case 'enter':       simulateEnter(); break;
    case 'count':       showCountdown(cue.text); break;
    case 'fx':          playFxVideo(cue.id, { left: cue.left, top: cue.top, width: cue.width }); break;
    case 'challenger':  showChallenger(cue.idx); break;
    case 'damage':      applyExactDamage(cue.side, cue.amount); break;
    // Block-positioned moves (10 vertical columns; block N center = (N*10-5)vw)
    case 'hit':         hitAtBlock(cue.block, cue.side, cue.amount); break;
    case 'block':       blockAtBlock(cue.block); break;
    case 'miss':        missAtBlock(cue.block); break;
    case 'fireball':    playMediumFX(cue.side, { amount: cue.amount }); break;
    // Split fireball: song-locked precision. Pair a fire-visual cue with
    // a fire-impact cue ~1.28s later so the burst lands on the beat.
    case 'fire-visual': playMediumFXVisual(cue.side); break;
    case 'fire-impact': playMediumFXImpact(cue.side, { amount: cue.amount }); break;
    case 'splice':      spliceShowTrack(cue.to); break;
    case 'ulti':        playUltiVideo(cue.side || 'p1', !!cue.kill); break;
    default:            console.warn('unknown cue', cue);
  }
}

/* ---- 10-column block coordinate system --------------------------------
   The screen is 10 vertical blocks. Block N (1..10) is centered at
   (N*10 - 5)vw — so block 1 = 5vw (far left), block 6 = 55vw, block 10 = 95vw. */
function blockX(n) { return (n * 10 - 5) + 'vw'; }

// A punch that LANDS at a column: sharp white impact + flash + sparks +
// shake, and applies damage to the struck side (KO handled downstream).
function hitAtBlock(block, struck, amount) {
  const x = blockX(block);
  playFxVideo('punchFx', { left: x, top: '50%' });
  // quick white flash burst behind the impact
  const burst = document.createElement('div');
  burst.className = 'hit-burst';
  burst.style.left = x; burst.style.top = '50%';
  document.body.appendChild(burst);
  requestAnimationFrame(() => burst.classList.add('go'));
  setTimeout(() => burst.remove(), 500);
  spawnSparks(struck === 'p2' ? 'p2' : 'p1', struck === 'p2', 10, 3);
  hitShake();
  // Damage (no extra default hit fx — this cue positions its own)
  const f = fight[struck];
  if (f && !f.defeated) {
    f.hp = Math.max(0, f.hp - (amount || 0));
    if (f.hp <= 0) handleKO(struck);
    renderFightHUD(struck);
  }
}

// A BLOCK at a column: crystalline clash, cool & contained, NO damage.
function blockAtBlock(block) {
  playFxVideo('blockFx', { left: blockX(block), top: '50%' });
  hitShake();
}

// A MISS at a column: fast whiff swipe, NO impact, NO damage.
function missAtBlock(block) {
  const w = document.getElementById('whiffFx');
  if (!w) return;
  w.style.left = blockX(block);
  w.style.top  = '50%';
  w.classList.remove('go'); void w.offsetWidth; w.classList.add('go');
}

function tickChoreography() {
  if (!showRunning) { tickActive = false; return; }

  // ---- SELECT cues: wall-clock from P-press, only while still selecting
  if (phase === 'selecting') {
    const elapsed = (performance.now() - showStartedAt) / 1000;
    while (
      lastSelectCueIdx + 1 < SELECT_CUES.length &&
      SELECT_CUES[lastSelectCueIdx + 1].t <= elapsed
    ) {
      lastSelectCueIdx++;
      try { runCue(SELECT_CUES[lastSelectCueIdx]); }
      catch (err) { console.warn('select cue error', err); }
    }
  }

  // ---- SHOW cues: against the show-track's own playhead
  if (!bgmShow.paused) {
    const t = bgmShow.currentTime || 0;
    while (
      lastShowCueIdx + 1 < SHOW_CUES.length &&
      SHOW_CUES[lastShowCueIdx + 1].t <= t
    ) {
      lastShowCueIdx++;
      try { runCue(SHOW_CUES[lastShowCueIdx]); }
      catch (err) { console.warn('show cue error', err); }
    }
  }

  requestAnimationFrame(tickChoreography);
}

function startShow() {
  reset();
  bgmStarted = false;

  // Unlock audio context (required after user gesture)
  audio();

  // Start with SELECT music from 0
  bgmSelect.muted = false;
  bgmShow.muted   = false;
  bgmSelect.currentTime = 0;
  bgmShow.pause();
  bgmShow.currentTime = 0;
  const p = bgmSelect.play();
  if (p && p.catch) p.catch(err => console.warn('select bgm:', err));
  bgmStarted = true;

  showStartedAt    = performance.now();
  lastSelectCueIdx = -1;
  lastShowCueIdx   = -1;
  showRunning = true;
  ensureTick();
}

// Start the cue loop only if one isn't already running (prevents double-fire
// when a jump happens mid-show).
function ensureTick() {
  if (!tickActive) { tickActive = true; requestAnimationFrame(tickChoreography); }
}

/* ------------------------------------------------------------------
   jumpToSection(n) — rehearsal scrubbing. Number keys 1-4 jump the
   show straight to a section, setting up the fight state + music so
   that section plays correctly from there:
     1  Top — full restart (select music + auto-picks)
     2  VS screen — show track from SHOW_BGM_START_TIME, then auto-advances
                   into the fight after VS_TO_FIGHT_DELAY
     3  Second verse / fireballs     (show 68s)  R1 down, MARKUS in
     4  Bridge / ulti                (show 112s) AARON down, KENG I in
------------------------------------------------------------------ */
function teamFight(p1Active, p1hp, p2Active, p2hp) {
  fight.p1 = { team: [CHARACTERS[0], CHARACTERS[4]], activeIdx: p1Active, hp: p1hp, defeated: false }; // AARON, KENG I
  fight.p2 = { team: [CHARACTERS[7], CHARACTERS[5]], activeIdx: p2Active, hp: p2hp, defeated: false }; // BRAYDON, MARKUS
}
function setShowCueIndexForTime(t) {
  lastShowCueIdx = -1;
  for (let i = 0; i < SHOW_CUES.length; i++) {
    if (SHOW_CUES[i].t <= t) lastShowCueIdx = i; else break;
  }
}
function jumpToSection(n) {
  audio(); // unlock audio on the keypress

  // Clear lingering overlays
  document.getElementById('vsScreen').classList.remove('visible');
  document.getElementById('fightKO').classList.remove('show');
  const uv = document.getElementById('ultiVideo'); uv.pause(); uv.classList.remove('show');
  document.getElementById('koVideo').classList.remove('playing');

  if (n === 1) { startShow(); return; }   // full restart from the top

  if (n === 2) {
    // Start at the VS screen; the SHOW_CUES 'enter' beat carries it into
    // the fight VS_TO_FIGHT_DELAY seconds later, same as the natural flow.
    state.p1.selections = [0, 4]; state.p1.done = true;   // AARON + KENG I
    state.p2.selections = [7, 5]; state.p2.done = true;   // BRAYDON + MARKUS
    phase = 'vs';
    triggerVS();

    lastSelectCueIdx = SELECT_CUES.length;  // skip all select cues
    setShowCueIndexForTime(SHOW_BGM_START_TIME);

    bgmSelect.pause();
    bgmShow.muted = muted;
    bgmShow.currentTime = SHOW_BGM_START_TIME;
    const p = bgmShow.play();
    if (p && p.catch) p.catch(err => console.warn('show bgm:', err));

    showRunning = true;
    ensureTick();
    return;
  }

  // Sections 3-4: jump straight into the fight on the show track
  state.p1.selections = [0, 4]; state.p1.done = true;   // AARON + KENG I
  state.p2.selections = [7, 5]; state.p2.done = true;   // BRAYDON + MARKUS
  phase = 'fighting';
  // Show the fight screen / hide select-grid layers
  const fs = document.getElementById('fightScreen');
  fs.classList.remove('visible'); void fs.offsetWidth; fs.classList.add('visible');

  let t;
  if (n === 3)      { teamFight(0, 54, 1, 100); t = 68;  }  // fireballs: AARON ~54hp, MARKUS in
  else if (n === 4) { teamFight(1, 100, 1, 100); t = 112; }  // ulti: KENG I in, MARKUS in
  else return;

  renderFightHUD('p1'); renderFightHUD('p2');
  setShowCueIndexForTime(t);
  lastSelectCueIdx = SELECT_CUES.length;  // skip all select cues

  // Switch to the show track at the section time and play
  bgmSelect.pause();
  bgmShow.muted = muted;
  bgmShow.currentTime = t;
  const p = bgmShow.play();
  if (p && p.catch) p.catch(err => console.warn('show bgm:', err));

  showRunning = true;
  ensureTick();
}

function stopShow() {
  showRunning = false;
  bgmSelect.pause();
  bgmShow.pause();
  const v = document.getElementById('ultiVideo');
  v.pause(); v.classList.remove('show');
}

/* ==================================================================
   ============  UNLOCK AUDIO + KEYBOARD  ============================
   ================================================================== */
function unlockAudio() {
  audio();
  startBGM();
}

document.addEventListener('click', unlockAudio, { once: false });

document.addEventListener('keydown', (e) => {
  unlockAudio();

  // Global (work in any phase)
  if (e.key === 'r' || e.key === 'R') { stopShow(); reset(); return; }
  if (e.key === 'm' || e.key === 'M') { setMuted(!muted); return; }
  if (e.key === 'f' || e.key === 'F') {
    if (!document.fullscreenElement) document.documentElement.requestFullscreen?.();
    else document.exitFullscreen?.();
    return;
  }
  // Show controls: P starts the time-locked show, O stops it
  if (e.key === 'p' || e.key === 'P') { startShow(); e.preventDefault(); return; }
  if (e.key === 'o' || e.key === 'O') { stopShow(); e.preventDefault(); return; }
  // Section scrub (rehearsal): 1=top  2=chorus/fight  3=fireballs  4=ulti
  if (e.key === '1') { jumpToSection(1); e.preventDefault(); return; }
  if (e.key === '2') { jumpToSection(2); e.preventDefault(); return; }
  if (e.key === '3') { jumpToSection(3); e.preventDefault(); return; }
  if (e.key === '4') { jumpToSection(4); e.preventDefault(); return; }

  // Enter advances the phase: selecting->vs->fighting (when both players ready)
  if (e.key === 'Enter') {
    if (phase === 'selecting') {
      if (bothPlayersReady()) {
        phase = 'vs';
        swapMusicForPhase('vs');
        triggerVS();
      } else {
        confirm('p1');
      }
      e.preventDefault();
      return;
    }
    if (phase === 'vs') {
      phase = 'fighting';
      startFight();
      e.preventDefault();
      return;
    }
    // (in fighting phase Enter is unused - prevents accidental restart)
    e.preventDefault();
    return;
  }

  // ----- FIGHT PHASE: operator controls --------------------------------
  if (phase === 'fighting') {
    switch (e.key.toLowerCase()) {
      // P1 health
      case 'a': damagePlayer('p1'); e.preventDefault(); return;
      case 'd': healPlayer('p1');   e.preventDefault(); return;
      // P1 moves
      case 'q': playMediumFX('p1'); e.preventDefault(); return;
      case 'e': playSuperFX('p1');  e.preventDefault(); return;
      // P2 moves (keys near right-hand)
      case '[': playMediumFX('p2'); e.preventDefault(); return;
      case ']': playSuperFX('p2');  e.preventDefault(); return;
    }
    switch (e.key) {
      case 'ArrowLeft':  damagePlayer('p2'); e.preventDefault(); return;
      case 'ArrowRight': healPlayer('p2');   e.preventDefault(); return;
    }
    return;
  }

  // ----- SELECTING PHASE -----------------------------------------------
  // P1: WASD
  switch (e.key.toLowerCase()) {
    case 'w': move('p1', -1, 0); e.preventDefault(); return;
    case 's': move('p1',  1, 0); e.preventDefault(); return;
    case 'a': move('p1',  0, -1); e.preventDefault(); return;
    case 'd': move('p1',  0,  1); e.preventDefault(); return;
  }

  // P2: Arrows + Right Shift
  switch (e.key) {
    case 'ArrowUp':    move('p2', -1, 0); e.preventDefault(); return;
    case 'ArrowDown':  move('p2',  1, 0); e.preventDefault(); return;
    case 'ArrowLeft':  move('p2',  0, -1); e.preventDefault(); return;
    case 'ArrowRight': move('p2',  0,  1); e.preventDefault(); return;
  }
  if (e.code === 'ShiftRight' || (e.key === 'Shift' && e.location === 2)) {
    confirm('p2'); e.preventDefault(); return;
  }
});

/* ==================================================================
   ============  INIT + RESIZE HANDLER  ==============================
   ================================================================== */
function initLayout() {
  recomputeSlotOffsets();
  updateCursors();
  updatePreview('p1');
  updatePreview('p2');
  updateHoverPreview('p1');
  updateHoverPreview('p2');
}
window.addEventListener('resize', () => {
  recomputeSlotOffsets();
  updateCursors();
});
window.addEventListener('load', initLayout);
requestAnimationFrame(() => requestAnimationFrame(initLayout));
</script>
</body>
</html>
